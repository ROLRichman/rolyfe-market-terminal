<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RO'Lyfe Market Terminal</title>
<script src="https://s3.tradingview.com/tv.js"></script>

<style>
body{
  margin:0;
  background:radial-gradient(circle at top,#020617,#000);
  color:#e2e8f0;
  font-family:Arial;
}

#app{padding:15px;max-width:1400px;margin:auto}

.top-bar{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:10px;
}

select,input{
  padding:8px;
  border-radius:6px;
  background:#1e293b;
  color:#fff;
  border:none;
}

button{
  padding:8px;
  border:none;
  border-radius:6px;
  background:#00ff88;
  color:#000;
  font-weight:bold;
  cursor:pointer;
}

.box{
  background:#1b2236;
  padding:6px;
  border-radius:6px;
  text-align:center;
  cursor:pointer;
  font-size:12px;
}

#score-bar{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
  gap:6px;
  margin-bottom:10px;
}

#heatmap{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(70px,1fr));
  gap:6px;
}

.tile{
  padding:6px;
  border-radius:6px;
  text-align:center;
  cursor:pointer;
  font-size:11px;
}

#heatmap-values{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:10px;
  max-height:350px;
  overflow-y:auto;
}

.cell{
  background:#111827;
  padding:10px;
  border-radius:8px;
  font-size:12px;
}

.alert{
  position:fixed;
  top:60px;
  right:15px;
  padding:10px;
  border-radius:8px;
  color:#fff;
  font-weight:bold;
  z-index:999;
}

.link-green{
  color:#00ff88;
  font-weight:bold;
}
</style>
</head>

<body>

<div id="app">

<h2 style="text-align:center">🔥 RO’Lyfe Terminal</h2>

<!-- CONTROLS -->
<div class="top-bar">
<select id="symbol-select"></select>

<select id="mode">
<option value="live">LIVE MODE</option>
<option value="sniper">SNIPER MODE</option>
</select>

<select id="tf">
<option value="D">Daily</option>
<option value="240">4H</option>
<option value="15">15m</option>
<option value="5">5m</option>
</select>

<input placeholder="Search Symbol" oninput="filterSymbols(this.value)">
</div>

<!-- MAIN CHART -->
<div id="chart" style="height:450px;margin-bottom:10px"></div>

<!-- SIGNAL BAR -->
<div id="score-bar"></div>

<!-- HEATMAP -->
<h4>Heatmap</h4>
<div id="heatmap"></div>

<h4>Heatmap Values</h4>
<div id="heatmap-values"></div>

<!-- OPTIONS -->
<button onclick="toggleOptions()">💥 Show Options Ladder</button>
<div id="options" style="display:none"></div>

<!-- MULTI CHART -->
<h3>Market Multi-Chart</h3>

<select onchange="setMulti(this.value)">
<option>BTCUSD</option>
<option>ETHUSD</option>
<option>EURUSD</option>
<option>GBPUSD</option>
<option>XAUUSD</option>
<option>SPX</option>
<option>NAS100</option>
</select>

<div id="multi" style="height:350px"></div>

<!-- LINKS -->
<h4>Market & Tools</h4>
<ul>
<li><a class="link-green" target="_blank" href="https://stockcharts.com/freecharts/perf.php?$COMPQ,iwm,$INDU,$SPX">Major Market</a></li>
<li><a class="link-green" target="_blank" href="https://stockcharts.com/freecharts/perf.php?SPY,XLY,XLC,XLK,XLI,XLB,XLE,XLP,XLV,XLU,XLF">Sector Rotation</a></li>
<li><a class="link-green" target="_blank" href="https://finviz.com/screener.ashx?v=211&f=sh_avgvol_o2000,sh_opt_optionshort,sh_price_o10,ta_sma200_pa,ta_sma50_pa&o=-perf4w">💚 FinViz Screener</a></li>
<li><a class="link-green" target="_blank" href="https://www.marketwatch.com/economy-politics/calendar">Economic Calendar</a></li>
<li><a class="link-green" target="_blank" href="https://finviz.com/map.ashx?t=sec">Heatmap</a></li>
<li><a class="link-green" target="_blank" href="https://www.cmegroup.com/markets/interest-rates/cme-fedwatch-tool.html">FedWatch</a></li>
<li><a class="link-green" target="_blank" href="https://finance.yahoo.com/">Yahoo Finance</a></li>
</ul>

</div>

<script>

const watchlist=["AAPL","TSLA","NVDA","SPY","QQQ","MSFT","AMZN","META","BAC","XOM","GOOGL","NFLX","AMD","COIN","PLTR","BTCUSD","ETHUSD"];

let signals={},symbol="AAPL",mode="live";

const select=document.getElementById("symbol-select");

watchlist.forEach(s=>{
  let o=new Option(s,s);
  select.appendChild(o);
});

select.onchange=e=>{
  symbol=e.target.value;
  loadChart();
};

function filterSymbols(val){
  [...select.options].forEach(o=>{
    o.style.display=o.value.includes(val.toUpperCase())?"block":"none";
  });
}

// CHART
function loadChart(){
  document.getElementById("chart").innerHTML="";
  new TradingView.widget({
    symbol:symbol,
    interval:document.getElementById("tf").value,
    container_id:"chart",
    theme:"dark",
    width:"100%",
    height:450,
    studies:["RSI@tv-basicstudies","MACD@tv-basicstudies","Stochastic@tv-basicstudies"]
  });
}

// MULTI
function setMulti(s){
  document.getElementById("multi").innerHTML="";
  new TradingView.widget({
    symbol:s,
    interval:"15",
    container_id:"multi",
    theme:"dark",
    width:"100%",
    height:350
  });
}

// SIGNAL ENGINE (SIMULATED BUT STRUCTURED)
function compute(){
  watchlist.forEach(s=>{
    let rsi=Math.random()*100;
    let action=rsi>70?"SELL":rsi<30?"BUY":"WAIT";

    signals[s]={rsi,action};
  });
}

// RENDER
function render(){

  let bar=document.getElementById("score-bar");
  bar.innerHTML="";

  Object.keys(signals).forEach(s=>{
    let d=signals[s];
    let div=document.createElement("div");
    div.className="box";
    div.innerHTML=`${s}<br>${d.action}<br>RSI:${Math.round(d.rsi)}`;
    div.onclick=()=>{symbol=s;loadChart();}
    bar.appendChild(div);
  });

  let heat=document.getElementById("heatmap");
  heat.innerHTML="";

  Object.keys(signals).forEach(s=>{
    let d=signals[s];
    let t=document.createElement("div");
    t.className="tile";
    t.innerText=`${s}\n${Math.round(d.rsi)}`;
    t.style.background=d.rsi>70?"#7f1d1d":d.rsi<30?"#14532d":"#78350f";
    t.onclick=()=>{symbol=s;loadChart();}
    heat.appendChild(t);
  });

  let values=document.getElementById("heatmap-values");
  values.innerHTML="";

  Object.keys(signals).forEach(s=>{
    let d=signals[s];
    let c=document.createElement("div");
    c.className="cell";
    c.innerHTML=`<b>${s}</b><br>RSI:${Math.round(d.rsi)}<br>${d.action}<br>Δ:-- IV:--`;
    values.appendChild(c);
  });
}

// OPTIONS
function toggleOptions(){
  let o=document.getElementById("options");
  o.style.display=o.style.display==="none"?"block":"none";

  o.innerHTML="";
  for(let i=0;i<5;i++){
    let div=document.createElement("div");
    div.className="cell";
    div.innerHTML=`CALL ${100+i*5} $${(Math.random()*5).toFixed(2)} Δ:${Math.random().toFixed(2)} IV:${(Math.random()*50).toFixed(1)}`;
    o.appendChild(div);
  }
}

// ALERT LOOP
function alerts(){
  Object.keys(signals).forEach(s=>{
    let d=signals[s];
    if(d.action!=="WAIT"){
      let a=document.createElement("div");
      a.className="alert";
      a.style.background=d.action==="BUY"?"#00ff88":"#ff4444";
      a.innerText=`${d.action} ${s}`;
      document.body.appendChild(a);
      setTimeout(()=>a.remove(),2000);
    }
  });
}

// LOOP
setInterval(()=>{
  compute();
  render();
  alerts();
},15000);

loadChart();
setMulti("BTCUSD");

</script>

</body>
</html>
