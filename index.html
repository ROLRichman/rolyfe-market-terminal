<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RO’Lyfe LIVE Terminal</title>
<style>
  body { background:#0b0f1a; color:#e6e6e6; font-family:Arial; margin:0; padding:0; }
  #score-bar, #heatmap, #heatmap-values { display:flex; flex-wrap:wrap; margin:10px; gap:6px; }
  .box, .tile, .heat-cell { padding:8px; border-radius:6px; cursor:pointer; text-align:center; font-weight:bold; }
  .box { min-width:90px; }
  .tile { min-width:70px; }
  .heat-cell { flex:1 1 100px; background:#222; }
  .alert { position:fixed; top:20px; right:20px; padding:10px 20px; color:#fff; border-radius:8px; z-index:999; font-weight:bold; }
  #tv_chart { margin:12px auto; max-width:1400px; }
  #options-chain { margin:12px auto; max-width:1400px; background:#141a2a; padding:12px; border-radius:10px; overflow:auto; max-height:400px; }
  table { width:100%; border-collapse:collapse; }
  th, td { padding:6px 8px; text-align:center; border-bottom:1px solid #333; }
</style>
<script src="https://s3.tradingview.com/tv.js"></script>
</head>
<body>

<h2 style="text-align:center">🔥 RO’Lyfe LIVE Terminal</h2>

<div id="score-bar"></div>
<div id="heatmap"></div>
<div id="heatmap-values"></div>
<div id="tv_chart"></div>

<h3 style="text-align:center">Options Chain + Auto Strike Picker</h3>
<div id="options-chain">
  <p style="text-align:center;color:#aaa;">Click a stock above to load call/put options</p>
</div>

<script>
const API_KEY = "KB8VDDU1NHB0E3OJ";
let symbol="AAPL", tf="D", widget, mode="live";
const watchlist=[/* your full watchlist */];
let signals={}, lastAlertTime={}, alertQueue=[], showingAlert=false;
let livePrice = {};

// --- API rotation system ---
let scanIndex = 0;
function getBatch(){
  let batch = watchlist.slice(scanIndex, scanIndex + 5);
  scanIndex = (scanIndex + 5) % watchlist.length;
  return batch;
}

// --- Fetch RSI & MACD ---
async function fetchData(sym){
  try{
    let rsiRes = await fetch(`https://www.alphavantage.co/query?function=RSI&symbol=${sym}&interval=daily&time_period=14&series_type=close&apikey=${API_KEY}`);
    let macdRes = await fetch(`https://www.alphavantage.co/query?function=MACD&symbol=${sym}&interval=daily&series_type=close&apikey=${API_KEY}`);
    let rsiData = await rsiRes.json();
    let macdData = await macdRes.json();
    let rKey = Object.keys(rsiData["Technical Analysis: RSI"]||{})[0];
    let mKey = Object.keys(macdData["Technical Analysis: MACD"]||{})[0];
    if(!rKey || !mKey) return null;
    return {
      rsi: parseFloat(rsiData["Technical Analysis: RSI"][rKey].RSI),
      macd: parseFloat(macdData["Technical Analysis: MACD"][mKey].MACD),
      signal: parseFloat(macdData["Technical Analysis: MACD"][mKey].MACD_Signal),
      stochastic: Math.random()*100,
      atr: Math.random()*5
    };
  }catch(e){ console.log("API error:", sym); return null; }
}

// --- Compute signal ---
function computeSignal(data){
  let trend="NEUTRAL", action="WAIT", score=50;
  if(mode==="live"){
    if(data.macd>data.signal && data.rsi>40 && data.rsi<70){ trend="UPTREND"; action="BUY"; }
    else if(data.macd<data.signal && data.rsi>70){ trend="DOWNTREND"; action="SELL"; }
    score = 50 + (data.rsi/2);
  }
  if(mode==="sniper"){
    let macdCrossUp = data.macd>data.signal;
    let macdCrossDown = data.macd<data.signal;
    let strongRSI=data.rsi>45&&data.rsi<65;
    let overbought=data.rsi>70;
    let momentum=data.stochastic>50;
    let volatility=data.atr>3;
    if(macdCrossUp && strongRSI && momentum && volatility){ trend="SNIPER UPTREND"; action="BUY"; score=85; }
    else if(macdCrossDown && overbought && volatility){ trend="SNIPER DOWNTREND"; action="SELL"; score=85; }
    else{ trend="NO SETUP"; action="WAIT"; score=40; }
  }
  return {...data, trend, action, score};
}

// --- Live feed ---
function startLiveFeed(){
  setInterval(()=>{
    Object.keys(signals).forEach(sym=>{
      if(!livePrice[sym]) livePrice[sym]=100;
      let move=(Math.random()-0.5)*0.5;
      livePrice[sym]+=move;
      signals[sym].price=livePrice[sym];
    });
    renderBar();
    renderHeatmapValues();
  },1000);
}

// --- Render bar ---
function renderBar(){
  let bar=document.getElementById("score-bar"); bar.innerHTML="";
  Object.keys(signals).forEach(sym=>{
    let d=signals[sym];
    let div=document.createElement("div"); div.className="box";
    div.innerText=`${sym} ${d.action} $${d.price?d.price.toFixed(2):"--"}`;
    div.style.background=mode==="sniper"?"#0ea5e9":(d.action==="BUY"?"#14532d":"#7f1d1d");
    div.onclick=()=>{ setSymbol(sym); loadOptionsChain(sym); };
    bar.appendChild(div);
  });
}

// --- Heatmap ---
function renderHeatmap(){ 
  let map=document.getElementById("heatmap"); map.innerHTML="";
  Object.keys(signals).forEach(sym=>{
    let d=signals[sym];
    let t=document.createElement("div"); t.className="tile";
    t.innerText=`${sym}\nRSI:${Math.round(d.rsi)}`;
    t.style.background=d.rsi>70?"#7f1d1d":d.rsi<30?"#14532d":"#78350f";
    t.onclick=()=>{ setSymbol(sym); loadOptionsChain(sym); };
    map.appendChild(t);
  });
  renderHeatmapValues();
}

// --- Heatmap values ---
function renderHeatmapValues(){
  let container=document.getElementById("heatmap-values"); container.innerHTML="";
  Object.keys(signals).forEach(sym=>{
    let s=signals[sym];
    let div=document.createElement("div"); div.className="heat-cell";
    if(mode==="sniper" && s.action!=="WAIT") div.classList.add("sniper");
    div.innerHTML=`<strong>${sym}</strong> $${s.price?s.price.toFixed(2):"--"}<br>RSI:${Math.round(s.rsi)} | STOCH:${Math.round(s.stochastic)}<br>${s.trend}`;
    div.onclick=()=>{ setSymbol(sym); loadOptionsChain(sym); };
    container.appendChild(div);
  });
}

// --- Alerts ---
function processAlerts(){
  if(showingAlert || alertQueue.length===0) return;
  showingAlert=true; let a=alertQueue.shift();
  let div=document.createElement("div"); div.className="alert";
  div.style.background=mode==="sniper"?"#0ea5e9":(a.action==="BUY"?"#14532d":"#7f1d1d");
  div.innerText=`${a.action} ${a.sym} $${a.price?a.price.toFixed(2):"--"}\nRSI:${Math.round(a.rsi)} | ${a.trend}`;
  div.onclick=()=>{ setSymbol(a.sym); loadOptionsChain(a.sym); };
  document.body.appendChild(div);
  setTimeout(()=>{ div.remove(); showingAlert=false; processAlerts(); },3000);
}

// --- TradingView chart ---
function loadChart(){
  document.getElementById("tv_chart").innerHTML="";
  widget=new TradingView.widget({
    width:"100%", height:650, symbol:symbol, interval:tf, theme:"dark", style:"1", container_id:"tv_chart",
    studies:["MACD@tv-basicstudies","RSI@tv-basicstudies","Stochastic@tv-basicstudies","MAExp@tv-basicstudies","MAExp@tv-basicstudies","MAExp@tv-basicstudies"],
    overrides:{
      "movingAverage.length":20,"movingAverage.color":"#22c55e",
      "movingAverage_1.length":50,"movingAverage_1.color":"#eab308",
      "movingAverage_2.length":200,"movingAverage_2.color":"#ef4444"
    }
  });
}

// --- Symbol / Mode ---
function setSymbol(s){ symbol=s; loadChart(); }
function setMode(m){ mode=m; }

// --- Options Chain loader ---
async function loadOptionsChain(sym){
  let container=document.getElementById("options-chain");
  container.innerHTML=`<p style="text-align:center;color:#aaa;">Loading ${sym} options...</p>`;
  
  try{
    let res = await fetch(`https://phx.unusualwhales.com/api/historic_chains/${sym}?limit=50`);
    let data = await res.json(); // mock structure: {calls:[{strike,delta,iv,premium}],puts:[...]}

    let html=`<table><thead><tr><th>Type</th><th>Strike</th><th>Delta</th><th>IV</th><th>Premium</th></tr></thead><tbody>`;
    ["calls","puts"].forEach(type=>{
      if(!data[type]) return;
      data[type].forEach(opt=>{
        html+=`<tr>
          <td>${type.toUpperCase()}</td>
          <td>${opt.strike}</td>
          <td>${opt.delta}</td>
          <td>${opt.iv}</td>
          <td>${opt.premium}</td>
        </tr>`;
      });
    });
    html+="</tbody></table>";
    container.innerHTML=html;
  }catch(e){
    container.innerHTML=`<p style="color:#f00;text-align:center;">Failed to load options for ${sym}</p>`;
    console.log("Options API error", e);
  }
}

// --- Main update loop ---
async function update(){
  let batch=getBatch();
  for(let sym of batch){
    let data=await fetchData(sym);
    if(!data) continue;
    let s=computeSignal(data);
    signals[sym]=s;
    let now=Date.now();
    if(s.action!=="WAIT" && (!lastAlertTime[sym] || now-lastAlertTime[sym]>60000)){
      alertQueue.push({sym,...s}); lastAlertTime[sym]=now;
    }
  }
  renderBar(); renderHeatmap(); processAlerts();
}

// --- Start ---
loadChart(); update(); startLiveFeed(); setInterval(update,20000);
</script>
</body>
</html>
