<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://s3.tradingview.com/tv.js"></script>

<style>
body{background:#020617;color:#e2e8f0;font-family:Arial;margin:0;transition:.4s}
#app{padding:12px;max-width:1400px;margin:auto}

.row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.section{margin-top:20px}

select,input{padding:8px;border-radius:6px;background:#111;color:#fff;border:none}
button{padding:10px;border:none;border-radius:8px;background:#00ff88;color:#000;font-weight:bold;cursor:pointer}

.box{background:#111;padding:10px;border-radius:8px;font-size:12px;cursor:pointer}
.tile{width:80px;height:80px;background:#111;border-radius:8px;font-size:11px;display:flex;align-items:center;justify-content:center;text-align:center}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}

.alert{position:fixed;right:10px;padding:10px;border-radius:8px;font-weight:bold;z-index:999}

.link-green{color:#00ff88;text-decoration:none}
.link-green:hover{text-shadow:0 0 8px #00ff88}
</style>
</head>

<body>
<div id="app">

<!-- CONTROLS -->
<div class="row">
<select id="symbol-select"></select>

<select onchange="mode=this.value">
<option value="live">LIVE MODE</option>
<option value="sniper">SNIPER MODE</option>
</select>

<select onchange="tf=this.value;loadChart()">
<option value="5">5m</option>
<option value="15">15m</option>
<option value="240">4H</option>
<option value="D">DAY</option>
</select>
</div>

<input placeholder="Search Symbol..." oninput="filter(this.value)">

<div id="score-bar" class="row"></div>

<!-- MAIN CHART -->
<div class="section">
<div id="chart" style="height:420px"></div>
</div>

<!-- OPTIONS -->
<div class="section">
<button onclick="toggleOptions()">💥 Show Options Ladder</button>
<div id="options" class="row"></div>
</div>

<!-- CALCULATOR -->
<div class="section">
<button onclick="toggleCalc()">📊 Trade Calculator</button>
<div id="calc"></div>
</div>

<!-- HEATMAP -->
<div class="section">
<h3>Heatmap</h3>
<div id="heatmap" class="row"></div>

<h4>Heatmap Values</h4>
<div id="heatmap-values" class="grid"></div>
</div>

<!-- SECOND CHART -->
<div class="section">
<h3>Market Multi-Chart</h3>

<select onchange="loadChart2(this.value)">
<option>AAPL</option><option>TSLA</option><option>NVDA</option>
<option>SPY</option><option>QQQ</option>
<option>BTCUSD</option><option>ETHUSD</option>
<option>EURUSD</option><option>GBPUSD</option>
<option>ES1!</option><option>NQ1!</option>
</select>

<div id="chart2" style="height:360px"></div>
</div>

<!-- LINKS -->
<div class="section">
<h4>Market & Tools</h4>
<ul>
<li><a class="link-green" target="_blank" href="https://stockcharts.com/freecharts/perf.php?$COMPQ,iwm,$INDU,$SPX">Major Market</a></li>
<li><a class="link-green" target="_blank" href="https://stockcharts.com/freecharts/perf.php?SPY,XLY,XLC,XLK,XLI,XLB,XLE,XLP,XLV,XLU,XLF">Sector Rotation</a></li>
<li><a class="link-green" target="_blank" href="https://finviz.com/screener.ashx?v=211&f=sh_avgvol_o2000,sh_opt_optionshort">FinViz Screener</a></li>
<li><a class="link-green" target="_blank" href="https://finance.yahoo.com/">Yahoo Finance</a></li>
</ul>
</div>

</div>

<script>

let symbol="AAPL", tf="15", mode="live";

const watchlist=[
"AAPL","TSLA","NVDA","SPY","QQQ","MSFT","AMZN","META","GOOGL","BAC","C",
"AMD","PLTR","COIN","SHOP","TSM",
"BTCUSD","ETHUSD","SOLUSD","XRPUSD",
"EURUSD","GBPUSD","USDJPY",
"ES1!","NQ1!"
];

let signals={};

window.onload=()=>{
let sel=document.getElementById("symbol-select");

watchlist.forEach(s=>{
let o=document.createElement("option");
o.value=s;o.text=s;
sel.appendChild(o);
});

sel.onchange=(e)=>{symbol=e.target.value;loadChart();};

loadChart();
loadChart2("BTCUSD");
loop();
};

function filter(v){
document.querySelectorAll("#symbol-select option").forEach(o=>{
o.style.display=o.value.includes(v.toUpperCase())?"block":"none";
});
}

function loadChart(){
document.getElementById("chart").innerHTML="";
new TradingView.widget({
container_id:"chart",
symbol:symbol,
interval:tf,
theme:"dark",
studies:[
"RSI@tv-basicstudies",
"MACD@tv-basicstudies",
"Stochastic@tv-basicstudies",
"MASimple@tv-basicstudies"
]
});
}

function loadChart2(sym){
document.getElementById("chart2").innerHTML="";
new TradingView.widget({
container_id:"chart2",
symbol:sym,
interval:"15",
theme:"dark"
});
}

function buildSignal(sym){
let rsi=Math.random()*100;
let stoch=Math.random()*100;

let action="WAIT";

if(rsi<30 && stoch<20) action="BUY";
if(rsi>70 && stoch>80) action="SELL";

signals[sym]={rsi,stoch,action};

if(action!=="WAIT") fireAlert(sym,action,rsi,stoch);
}

function render(){

let bar=document.getElementById("score-bar");
let heat=document.getElementById("heatmap");
let grid=document.getElementById("heatmap-values");

bar.innerHTML="";
heat.innerHTML="";
grid.innerHTML="";

Object.keys(signals).forEach(s=>{
let d=signals[s];

let b=document.createElement("div");
b.className="box";
b.innerHTML=`${s}<br>${d.action}<br>${Math.round(d.rsi)}`;
b.onclick=()=>{symbol=s;loadChart();};
bar.appendChild(b);

let t=document.createElement("div");
t.className="tile";
t.innerText=s+"\n"+Math.round(d.rsi);
heat.appendChild(t);

let c=document.createElement("div");
c.className="box";
c.innerHTML=`${s}<br>RSI:${Math.round(d.rsi)}<br>${d.action}`;
grid.appendChild(c);

});
}

function fireAlert(sym,act,rsi,stoch){
let div=document.createElement("div");
div.className="alert";
div.style.top=(60+document.querySelectorAll(".alert").length*60)+"px";
div.style.background=act==="BUY"?"#00ff88":"#ff4444";
div.innerHTML=`${act} ${sym}<br>RSI:${Math.round(rsi)} STOCH:${Math.round(stoch)}`;
document.body.appendChild(div);
setTimeout(()=>div.remove(),5000);
}

function toggleOptions(){
let o=document.getElementById("options");
o.innerHTML="";
for(let i=0;i<5;i++){
let d=document.createElement("div");
d.className="box";
d.innerText=`CALL ${100+i*5} $${(Math.random()*3).toFixed(2)}`;
o.appendChild(d);
}
}

function toggleCalc(){
let c=document.getElementById("calc");
c.innerHTML=`
Balance <input id="bal" value="500">
Risk % <input id="risk" value="5">
Entry <input id="entry" value="1.5">
Stop <input id="stop" value="1.2">
<button onclick="runCalc()">CALCULATE</button>
<div id="result"></div>
`;
}

function runCalc(){
let B=+bal.value;
let R=+risk.value/100;
let E=+entry.value;
let S=+stop.value;

let riskAmt=B*R;
let per=Math.abs(E-S)||1;

let qty=Math.floor(riskAmt/per);

result.innerHTML=`
Qty:${qty}<br>
Risk:$${riskAmt.toFixed(2)}<br>
T1:${(E+per).toFixed(2)}<br>
T2:${(E+2*per).toFixed(2)}<br>
T3:${(E+3*per).toFixed(2)}
`;
}

function loop(){
watchlist.forEach(buildSignal);
render();
setTimeout(loop,15000);
}

</script>
</body>
</html>
