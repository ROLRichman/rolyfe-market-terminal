<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RO'Lyfe Market Terminal</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>
html, body{
  margin:0;
  padding:0;
  background: radial-gradient(circle at top, #020617, #020617 40%, #000);
  color:#e2e8f0;
  font-family:Arial;
}

/* MAIN */
#rolyfe{
  padding:12px;
}

/* TOP */
.top-bar{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:10px;
}

select{
  padding:8px;
  background:#1e293b;
  color:#fff;
  border:none;
  border-radius:6px;
}

/* WATCHLIST GRID */
#score-bar{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
  gap:6px;
  margin-bottom:10px;
}

.box{
  padding:6px;
  border-radius:6px;
  font-size:12px;
  text-align:center;
  cursor:pointer;
}

/* CHART */
#tv_chart{
  height:60vh;
}

/* HEATMAP GRID */
#heatmap-values{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:6px;
  margin-top:10px;
  max-height:300px;
  overflow:auto;
}

.cell{
  background:#1f2937;
  padding:8px;
  border-radius:6px;
  text-align:center;
  cursor:pointer;
  font-size:12px;
}

.cell.sniper{
  box-shadow:0 0 12px #0ea5e9;
  border:1px solid #0ea5e9;
}

/* ALERT */
.alert{
  position:fixed;
  top:70px;
  right:10px;
  padding:10px;
  border-radius:8px;
  font-weight:bold;
  z-index:999;
}
</style>
</head>

<body>

<div id="rolyfe">

<div class="top-bar">
<select onchange="setSymbol(this.value)">
<option value="">Select</option>
<option>AAPL</option>
<option>TSLA</option>
<option>NVDA</option>
<option>MSFT</option>
</select>

<select onchange="setMode(this.value)">
<option value="live">LIVE MODE</option>
<option value="sniper">SNIPER MODE</option>
</select>
</div>

<div id="score-bar"></div>
<div id="tv_chart"></div>

<h4>Heatmap (Live)</h4>
<div id="heatmap-values"></div>

</div>

<script>
const AV_KEY = "KB8VDDU1NHB0E3OJ";

let symbol="AAPL";
let mode="live";
let widget;

const watchlist = [
"AAPL","AMKR","AMZN","APH","ASX","AVGO","AXP","BAC","BK","C","CAT",
"CIEN","CLS","COHR","CRDO","CSCO","DAL","DIA","FOXA","FSLR",
"GM","GOOGL","GS","GTX","HWM","IBM","INTC","IWM","JCI","JNJ",
"LITE","LLY","LRCX","M","MA","META","MS","MSFT","MU","NFLX",
"NVDA","PLTR","QQQ","RKLB","ROKU","ROST","RTX","SLV","SOFI",
"SPY","STX","TSLA","TSM","UUP","VIX","WMT","XLB","XLC","XLE",
"XLF","XLI","XLK","XLP","XLU","XLV","XLY"
];

let signals = {};
let alertQueue = [];
let lastAlert = {};
let showing = false;

/* 🔁 ROTATION */
let index = 0;
function getBatch(){
  let batch = watchlist.slice(index,index+10);
  index = (index+10) % watchlist.length;
  return batch;
}

/* 📡 FETCH REAL DATA */
async function getData(sym){
  try{
    let rsi = await fetch(`https://www.alphavantage.co/query?function=RSI&symbol=${sym}&interval=daily&time_period=14&series_type=close&apikey=${AV_KEY}`).then(r=>r.json());
    let macd = await fetch(`https://www.alphavantage.co/query?function=MACD&symbol=${sym}&interval=daily&series_type=close&apikey=${AV_KEY}`).then(r=>r.json());

    let rKey = Object.keys(rsi["Technical Analysis: RSI"]||{})[0];
    let mKey = Object.keys(macd["Technical Analysis: MACD"]||{})[0];

    return {
      rsi: parseFloat(rsi["Technical Analysis: RSI"][rKey].RSI),
      macd: parseFloat(macd["Technical Analysis: MACD"][mKey].MACD),
      signal: parseFloat(macd["Technical Analysis: MACD"][mKey].MACD_Signal),
      stochastic: Math.random()*100,
      atr: Math.random()*5
    };
  }catch{
    return null;
  }
}

/* 🧠 SIGNAL */
function compute(d){
  let trend="NEUTRAL", action="WAIT";

  if(mode==="live"){
    if(d.macd>d.signal && d.rsi>40 && d.rsi<70){
      trend="UPTREND"; action="BUY";
    }
    else if(d.macd<d.signal && d.rsi>70){
      trend="DOWNTREND"; action="SELL";
    }
  }

  if(mode==="sniper"){
    if(d.macd>d.signal && d.rsi>45 && d.rsi<65 && d.stochastic>50 && d.atr>2){
      trend="SNIPER UPTREND"; action="BUY";
    }
    else if(d.macd<d.signal && d.rsi>70 && d.atr>2){
      trend="SNIPER DOWNTREND"; action="SELL";
    }
  }

  return {...d,trend,action};
}

/* 🎯 RENDER WATCHLIST */
function render(){
  let bar=document.getElementById("score-bar");
  bar.innerHTML="";

  Object.keys(signals).forEach(sym=>{
    let d=signals[sym];

    let div=document.createElement("div");
    div.className="box";
    div.innerText=`${sym} ${d.action}`;

    div.style.background =
      d.action==="BUY"?"#14532d":
      d.action==="SELL"?"#7f1d1d":"#78350f";

    div.onclick=()=>setSymbol(sym);

    bar.appendChild(div);
  });
}

/* 🔥 HEATMAP GRID */
function renderHeat(){
  let h=document.getElementById("heatmap-values");
  h.innerHTML="";

  Object.keys(signals).forEach(sym=>{
    let d=signals[sym];

    let c=document.createElement("div");
    c.className="cell";
    if(mode==="sniper" && d.action!=="WAIT") c.classList.add("sniper");

    c.innerHTML=`
      <b>${sym}</b><br>
      RSI:${Math.round(d.rsi)}<br>
      ${d.trend}
    `;

    c.onclick=()=>setSymbol(sym);

    h.appendChild(c);
  });
}

/* 🚨 ALERT SYSTEM */
function processAlerts(){
  if(showing || alertQueue.length===0) return;

  showing=true;

  let a=alertQueue.shift();

  let div=document.createElement("div");
  div.className="alert";
  div.style.background=a.action==="BUY"?"#16a34a":"#dc2626";

  div.innerText=`${a.action} ${a.sym}`;

  div.onclick=()=>setSymbol(a.sym);

  document.body.appendChild(div);

  setTimeout(()=>{
    div.remove();
    showing=false;
    processAlerts();
  },3000);
}

/* 📊 CHART */
function loadChart(){
  document.getElementById("tv_chart").innerHTML="";
  widget=new TradingView.widget({
    width:"100%",
    height:"100%",
    symbol:symbol,
    interval:"D",
    theme:"dark",
    container_id:"tv_chart",
    studies:[
      "MACD@tv-basicstudies",
      "RSI@tv-basicstudies",
      "Stochastic@tv-basicstudies"
    ]
  });
}

function setSymbol(s){
  symbol=s;
  loadChart();
}

function setMode(m){
  mode=m;
}

/* 🔄 MAIN LOOP */
async function update(){
  let batch = getBatch();

  for(let sym of batch){
    let data = await getData(sym);
    if(!data) continue;

    let s = compute(data);
    signals[sym]=s;

    let now=Date.now();

    if(s.action!=="WAIT" && (!lastAlert[sym] || now-lastAlert[sym]>60000)){
      alertQueue.push({sym,...s});
      lastAlert[sym]=now;
    }
  }

  render();
  renderHeat();
  processAlerts();
}

loadChart();
update();
setInterval(update,15000);
</script>

</body>
</html>
