<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://s3.tradingview.com/tv.js"></script>

<style>
body{
margin:0;
background:linear-gradient(#020617,#012a1a,#020617);
color:#e2e8f0;
font-family:Arial;
}

#app{padding:10px}

/* HEADER */
h2{text-align:center}

/* TOP BAR */
.topbar{
position:sticky;
top:0;
z-index:1000;
background:#020617;
padding:10px;
display:flex;
flex-wrap:wrap;
gap:6px;
border-bottom:1px solid #111;
}

/* INPUTS */
select,input{
padding:8px;
border-radius:6px;
border:none;
background:#111;
color:#fff;
}

/* BUTTON GLOW */
button{
background:#00ff88;
color:#000;
font-weight:bold;
border:none;
border-radius:6px;
padding:8px;
cursor:pointer;
animation:glow 2s infinite alternate;
}
@keyframes glow{
0%{box-shadow:0 0 5px #00ff88;}
100%{box-shadow:0 0 15px #00ff88;}
}

/* SECTIONS */
.section{
margin-top:15px;
padding:10px;
background:#0b0f1a;
border-radius:10px;
}

/* CHART FIX */
.chart-container{
width:100%;
overflow-x:auto;
}
.chart-inner{
min-width:900px;
}
#chart,#chart2{
height:520px;
}

/* WATCHLIST */
.list{
display:flex;
flex-wrap:wrap;
gap:6px;
}
.item{
padding:6px;
background:#111;
border-radius:6px;
font-size:12px;
cursor:pointer;
}
.buy{box-shadow:0 0 10px #00ff88}
.sell{box-shadow:0 0 10px #ff3b3b}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(110px,1fr));
gap:6px;
}
.cell{
background:#111;
padding:6px;
border-radius:6px;
text-align:center;
cursor:pointer;
}

/* ALERT */
.alert{
position:fixed;
right:10px;
padding:10px;
background:#000;
border-radius:8px;
z-index:999;
}

/* OPTIONS */
.option-box{
background:#111;
padding:8px;
margin-top:5px;
border-radius:6px;
}

/* LINKS */
.link{
display:block;
color:#00ff88;
margin:3px 0;
text-decoration:none;
}
</style>
</head>

<body>
<div id="app">

<h2>🔥 RO’LYFE TERMINAL — LEVEL 3 MONEY MACHINE</h2>

<!-- TOP BAR -->
<div class="topbar">
<select id="symbol-select"></select>

<select id="mode" onchange="renderWatchlist()">
<option value="live">LIVE</option>
<option value="sniper">SNIPER</option>
</select>

<select onchange="tf=this.value;loadChart()">
<option value="5">5m</option>
<option value="15">15m</option>
<option value="60">1H</option>
<option value="D">DAY</option>
</select>
</div>

<!-- WATCHLIST -->
<div class="section">
<h3>Market List</h3>
<div id="watch" class="list"></div>
</div>

<!-- VIDEO -->
<div class="section">
<iframe width="100%" height="300"
src="https://www.youtube.com/embed/S7vkiIX6yG4"
frameborder="0" allowfullscreen></iframe>
</div>

<!-- MAIN CHART -->
<div class="section">
<div class="chart-container">
<div class="chart-inner">
<div id="chart"></div>
</div>
</div>

<button onclick="toggleOptions('options')">💥 Options Ladder</button>
<div id="options" class="option-box"></div>

<button onclick="toggleCalc('calc')">📊 Trade Calculator</button>
<div id="calc" class="option-box"></div>
</div>

<!-- HEATMAP -->
<div class="section">
<h3>Heatmap</h3>
<div id="heatmap" class="grid"></div>
</div>

<!-- SECOND CHART -->
<div class="section">
<h3>Multi Chart</h3>

<select onchange="loadChart2(this.value)">
<option>AAPL</option>
<option>TSLA</option>
<option>SPY</option>
<option>BTCUSD</option>
<option>EURUSD</option>
<option>ES1!</option>
<option>NQ1!</option>
</select>

<div class="chart-container">
<div class="chart-inner">
<div id="chart2"></div>
</div>
</div>

<button onclick="toggleOptions('options2')">💥 Options Ladder</button>
<div id="options2" class="option-box"></div>

<button onclick="toggleCalc('calc2')">📊 Trade Calculator</button>
<div id="calc2" class="option-box"></div>
</div>

<!-- 🔥 FULL LINKS (RESTORED — NOTHING REMOVED) -->
<div class="section">
<h3>Market & Tools</h3>

<b>Major Market</b>
<a class="link" target="_blank" href="https://stockcharts.com/freecharts/perf.php?$COMPQ,iwm,$INDU,$SPX">Major Market</a>

<b>Sector Rotation</b>
<a class="link" target="_blank" href="https://stockcharts.com/freecharts/perf.php?SPY,XLY,XLC,XLK,XLI,XLB,XLE,XLP,XLV,XLU,XLF">Sector Rotation</a>

<b>Research</b>
<a class="link" target="_blank" href="https://finviz.com/">FinViz Screener</a>
<a class="link" target="_blank" href="https://finance.yahoo.com/">Yahoo Finance</a>

<b>Macro</b>
<a class="link" target="_blank" href="https://www.marketwatch.com/economy-politics/calendar">Economic Calendar</a>
<a class="link" target="_blank" href="https://finviz.com/map.ashx">S&P Heatmap</a>
<a class="link" target="_blank" href="https://www.cmegroup.com/markets/interest-rates/cme-fedwatch-tool.html">FedWatch</a>

</div>

</div>

<script>

let symbol="AAPL";
let tf="15";

const watchlist=[
"AAPL","TSLA","NVDA","SPY","QQQ","MSFT","AMZN","META","GOOGL",
"BAC","C","AMD","PLTR","COIN","SHOP","TSM",
"BTCUSD","ETHUSD","SOLUSD","XRPUSD",
"EURUSD","GBPUSD","USDJPY",
"ES1!","NQ1!","DXY","GLD","SLV"
];

let signals={};

window.onload=()=>{
let sel=document.getElementById("symbol-select");
watchlist.forEach(s=>{
let o=document.createElement("option");
o.value=s;o.text=s;
sel.appendChild(o);
});

loadChart();
loadChart2("AAPL");
loop();
};

/* CHARTS */
function loadChart(){
document.getElementById("chart").innerHTML="";
new TradingView.widget({
container_id:"chart",
symbol:symbol,
interval:tf,
theme:"dark",
allow_symbol_change:true,
studies:[
"RSI@tv-basicstudies",
"MACD@tv-basicstudies",
"Stochastic@tv-basicstudies",
"MASimple@tv-basicstudies"
]
});
}

function loadChart2(sym){
document.getElementById("chart2").innerHTML="";
new TradingView.widget({
container_id:"chart2",
symbol:sym,
interval:"15",
theme:"dark",
studies:[
"RSI@tv-basicstudies",
"Stochastic@tv-basicstudies",
"MASimple@tv-basicstudies",
"MASimple@tv-basicstudies",
"MASimple@tv-basicstudies"
]
});
}

/* SIGNAL ENGINE */
function buildSignal(sym){
let rsi=Math.random()*100;
let stoch=Math.random()*100;
let mode=document.getElementById("mode").value;

let action="WAIT";

if(mode==="sniper"){
if(rsi<25 && stoch<20) action="BUY";
if(rsi>75 && stoch>80) action="SELL";
}else{
if(rsi<30 && stoch<20) action="BUY";
if(rsi>70 && stoch>80) action="SELL";
}

signals[sym]=action;

if(action!=="WAIT"){
fireAlert(sym,action);
}
}

/* ALERT */
function fireAlert(sym,act){
let d=document.createElement("div");
d.className="alert";
d.style.top=(60+document.querySelectorAll(".alert").length*50)+"px";
d.style.color=act==="BUY"?"#00ff88":"#ff3b3b";
d.innerText=act+" "+sym;
document.body.appendChild(d);
setTimeout(()=>d.remove(),4000);
}

/* WATCHLIST */
function renderWatchlist(){
let w=document.getElementById("watch");
w.innerHTML="";

watchlist.forEach(s=>{
buildSignal(s);
let act=signals[s];

if(document.getElementById("mode").value==="sniper" && act==="WAIT") return;

let div=document.createElement("div");
div.className="item "+(act==="BUY"?"buy":act==="SELL"?"sell":"");
div.innerText=s+" "+act;
div.onclick=()=>{symbol=s;loadChart();};
w.appendChild(div);
});
}

/* OPTIONS */
function toggleOptions(id){
let o=document.getElementById(id);
o.innerHTML="";
for(let i=0;i<6;i++){
let div=document.createElement("div");
div.className="option-box";
div.innerText=`${symbol} ${100+i*5}C Δ0.${i+3} IV:${20+i}%`;
o.appendChild(div);
}
}

/* CALCULATOR */
function toggleCalc(id){
let c=document.getElementById(id);
c.innerHTML=`
Balance <input id="bal" value="500">
Risk % <input id="risk" value="5">
Entry <input id="entry" value="1.5">
Stop <input id="stop" value="1.2">
<button onclick="runCalc('${id}')">CALCULATE</button>
<div id="res_${id}"></div>
`;
}

function runCalc(id){
let B=+bal.value||0;
let R=+risk.value/100||0;
let E=+entry.value||0;
let S=+stop.value||0;
let riskAmt=B*R;
let diff=Math.abs(E-S)||1;
let qty=Math.floor(riskAmt/diff);

document.getElementById("res_"+id).innerHTML=
`Qty:${qty}<br>Risk:$${riskAmt.toFixed(2)}<br>
T1:${(E+diff).toFixed(2)}<br>
T2:${(E+2*diff).toFixed(2)}<br>
T3:${(E+3*diff).toFixed(2)}`;
}

/* LOOP */
function loop(){
renderWatchlist();
setTimeout(loop,10000);
}

</script>
</body>
</html>
