<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RO'Lyfe Terminal PRO</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>
body{
  margin:0;
  background:#020617;
  color:#e2e8f0;
  font-family:Arial;
}

/* HEADER */
.top{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  padding:10px;
  background:#0f172a;
}

select,input{
  padding:8px;
  border-radius:6px;
  background:#1e293b;
  color:#fff;
  border:none;
}

/* SIGNAL BAR */
#score-bar{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(110px,1fr));
  gap:6px;
  padding:10px;
}

.box{
  padding:6px;
  border-radius:6px;
  font-size:11px;
  text-align:center;
  cursor:pointer;
  transition:.2s;
}
.box:hover{transform:scale(1.05)}

/* CHARTS */
#tv_chart,#multiChart{
  width:100%;
  height:420px;
  margin-bottom:10px;
}

/* HEATMAP */
#heatmap{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(80px,1fr));
  gap:6px;
  padding:10px;
}

.tile{
  padding:6px;
  border-radius:6px;
  text-align:center;
  font-size:11px;
}

/* SCROLL GRID */
#heatmap-values{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:6px;
  max-height:350px;
  overflow-y:auto;
  padding:10px;
}

.cell{
  background:#111827;
  padding:8px;
  border-radius:6px;
  font-size:12px;
}

/* FLOATING SIGNAL */
.alert{
  position:fixed;
  top:60px;
  right:10px;
  background:#16a34a;
  padding:10px;
  border-radius:8px;
  font-weight:bold;
  animation:pop 0.4s;
}
@keyframes pop{from{transform:scale(.7)}to{transform:scale(1)}}

/* LINKS */
.link-green{
  color:#00ff88;
  font-weight:bold;
}

/* BUTTON */
.btn{
  background:#00ffc8;
  color:#000;
  padding:8px;
  border-radius:6px;
  cursor:pointer;
  margin:5px;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="top">

<select id="symbol-select"></select>

<select onchange="setMode(this.value)">
<option value="live">LIVE MODE</option>
<option value="sniper">SNIPER MODE</option>
</select>

<select onchange="setTF(this.value)">
<option value="5">5m</option>
<option value="15">15m</option>
<option value="240">4H</option>
<option value="D" selected>DAY</option>
<option value="M">MONTH</option>
</select>

<input placeholder="Search Symbol" oninput="filterSymbols(this.value)">

</div>

<!-- SIGNAL BAR -->
<div id="score-bar"></div>

<!-- MAIN CHART -->
<div id="tv_chart"></div>

<!-- HEATMAP -->
<div id="heatmap"></div>

<!-- SCROLL CELLS -->
<div id="heatmap-values"></div>

<!-- OPTIONS -->
<div class="btn" onclick="toggleLadder()">💥 Show Options Ladder</div>
<div id="options"></div>

<!-- SECOND CHART -->
<h3 style="padding-left:10px">Market Multi-Chart</h3>
<div id="multiChart"></div>

<!-- LINKS -->
<div style="padding:10px">
<h4>Market & Tools</h4>
<ul>
<li><a class="link-green" target="_blank" href="https://stockcharts.com/freecharts/perf.php?$COMPQ,iwm,$INDU,$SPX">Major Market</a></li>
<li><a class="link-green" target="_blank" href="https://stockcharts.com/freecharts/perf.php?SPY,XLY,XLC,XLK,XLI,XLB,XLE,XLP,XLV,XLU,XLF">Sector Rotation</a></li>
<li><a class="link-green" target="_blank" href="https://finviz.com/screener.ashx?v=211&f=sh_avgvol_o2000,sh_opt_optionshort">FinViz Screener</a></li>
<li><a class="link-green" target="_blank" href="https://finance.yahoo.com/">Yahoo Finance</a></li>
</ul>
</div>

<script>

/* =======================
   MASTER WATCHLIST
======================= */
const stocks=["AAPL","TSLA","NVDA","SPY","QQQ","MSFT","AMZN","META","PLTR","AMD"];
const crypto=["BTCUSD","ETHUSD","SOLUSD","XRPUSD"];
const forex=["EURUSD","GBPUSD","USDJPY"];
const all=[...stocks,...crypto,...forex];

let symbol="AAPL", tf="D", mode="live";
let signals={}, alertQueue=[];

/* =======================
   LOAD DROPDOWN
======================= */
const select=document.getElementById("symbol-select");
all.forEach(s=>select.add(new Option(s,s)));

function filterSymbols(val){
[...select.options].forEach(o=>{
o.style.display=o.value.includes(val.toUpperCase())?"block":"none";
});
}

/* =======================
   CHARTS
======================= */
function loadChart(){
tv_chart.innerHTML="";
new TradingView.widget({
symbol:symbol,
interval:tf,
container_id:"tv_chart",
width:"100%",
height:420,
studies:["RSI@tv-basicstudies","MACD@tv-basicstudies","Stochastic@tv-basicstudies"]
});
}

function loadMulti(){
multiChart.innerHTML="";
new TradingView.widget({
symbol:"BTCUSD",
interval:"15",
container_id:"multiChart",
width:"100%",
height:420
});
}

/* =======================
   SIGNAL ENGINE (REAL-ish)
======================= */
async function fetchData(){
return {
rsi:Math.random()*100,
stoch:Math.random()*100,
atr:Math.random()*5
};
}

function compute(d){
let action="WAIT",trend="NO SETUP";

if(mode==="live"){
if(d.rsi>55 && d.stoch>50){action="BUY";trend="UPTREND";}
if(d.rsi>75){action="SELL";trend="DOWNTREND";}
}

if(mode==="sniper"){
if(d.rsi>60 && d.stoch>60 && d.atr>2){action="BUY";trend="SNIPER";}
}

return {...d,action,trend};
}

/* =======================
   RENDER
======================= */
function render(){
score-bar.innerHTML="";
heatmap.innerHTML="";
heatmap-values.innerHTML="";

Object.keys(signals).forEach(sym=>{
let d=signals[sym];

/* BAR */
let b=document.createElement("div");
b.className="box";
b.innerHTML=`${sym}<br>${d.action}<br>RSI:${Math.round(d.rsi)}`;
b.style.background=d.action==="BUY"?"#14532d":d.action==="SELL"?"#7f1d1d":"#333";
b.onclick=()=>setSymbol(sym);
score-bar.appendChild(b);

/* TILE */
let t=document.createElement("div");
t.className="tile";
t.innerText=sym+"\n"+Math.round(d.rsi);
t.style.background=d.rsi>70?"red":d.rsi<30?"green":"orange";
heatmap.appendChild(t);

/* CELL */
let c=document.createElement("div");
c.className="cell";
c.innerHTML=`<b>${sym}</b><br>
RSI:${Math.round(d.rsi)}<br>
${d.trend}<br>
${d.action}`;
heatmap-values.appendChild(c);

});
}

/* =======================
   LOOP
======================= */
async function loop(){
for(let s of all){
let d=await fetchData();
signals[s]=compute(d);

/* ALERT */
if(signals[s].action==="BUY"){
let a=document.createElement("div");
a.className="alert";
a.innerText="BUY "+s;
document.body.appendChild(a);
setTimeout(()=>a.remove(),2000);
}
}
render();
}
setInterval(loop,15000);

/* =======================
   OPTIONS
======================= */
function toggleLadder(){
options.innerHTML="";
for(let i=0;i<5;i++){
let div=document.createElement("div");
div.className="cell";
div.innerHTML=`CALL ${100+i*5} $${(Math.random()*5).toFixed(2)}`;
options.appendChild(div);
}
}

/* =======================
   CONTROL
======================= */
function setSymbol(s){
symbol=s;
loadChart();
}

function setMode(m){mode=m;}
function setTF(t){tf=t;loadChart();}

/* INIT */
loadChart();
loadMulti();
loop();

</script>
</body>
</html>
