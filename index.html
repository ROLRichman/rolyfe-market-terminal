<script>
const API_KEY = "KB8VDDU1NHB0E3OJ";

let symbol="AAPL", tf="D", widget, mode="live";

const watchlist=[
"AAPL","AMKR","AMZN","APH","ASX","AVGO","AXP","BAC","BK","C","CAT","CIEN","CLS","COHR","CRDO","CSCO","DAL","DIA","FOXA","FSLR","GEGLD","GM","GOOGL","GS","GTX","HWM","IBM","INTC","IWM","JCI","JNJ","LITE","LLY","LRCX","M","MA","META","MS","MSFT","MU","NFLX","NVDANXT","PLTR","QQQ","REAL","RKLB","ROKU","ROST","RTX","SLV","SNDK","SOFI","SPY","STX","TER","TJX","TSLA","TSM","UUP","VIX","W","WBD","WDC","WMT","XLB","XLC","XLE","XLF","XLI","XLK","XLP","XLU","XLV","XLY"
];

let signals={}, lastAlertTime={}, alertQueue=[], showingAlert=false;

/* 🔁 ROTATION SYSTEM (API SAFE) */
let scanIndex = 0;
function getBatch(){
  let batch = watchlist.slice(scanIndex, scanIndex + 5);
  scanIndex = (scanIndex + 5) % watchlist.length;
  return batch;
}

/* 🔥 REAL DATA FETCH */
async function fetchData(sym){
  try{
    let rsiRes = await fetch(`https://www.alphavantage.co/query?function=RSI&symbol=${sym}&interval=daily&time_period=14&series_type=close&apikey=${API_KEY}`);
    let macdRes = await fetch(`https://www.alphavantage.co/query?function=MACD&symbol=${sym}&interval=daily&series_type=close&apikey=${API_KEY}`);

    let rsiData = await rsiRes.json();
    let macdData = await macdRes.json();

    let rKey = Object.keys(rsiData["Technical Analysis: RSI"]||{})[0];
    let mKey = Object.keys(macdData["Technical Analysis: MACD"]||{})[0];

    if(!rKey || !mKey) return null;

    return {
      rsi: parseFloat(rsiData["Technical Analysis: RSI"][rKey].RSI),
      macd: parseFloat(macdData["Technical Analysis: MACD"][mKey].MACD),
      signal: parseFloat(macdData["Technical Analysis: MACD"][mKey].MACD_Signal),

      // still hybrid (until we wire full feeds)
      stochastic: Math.random()*100,
      atr: Math.random()*5
    };

  }catch(e){
    console.log("API error:", sym);
    return null;
  }
}

/* 🧠 SIGNAL ENGINE */
function computeSignal(data){
  let trend="NEUTRAL", action="WAIT", score=50;

  if(mode==="live"){
    if(data.macd>data.signal && data.rsi>40 && data.rsi<70){
      trend="UPTREND"; action="BUY";
    }
    else if(data.macd<data.signal && data.rsi>70){
      trend="DOWNTREND"; action="SELL";
    }
    score = 50 + (data.rsi/2);
  }

  if(mode==="sniper"){
    let macdCrossUp = data.macd > data.signal;
    let macdCrossDown = data.macd < data.signal;

    let strongRSI = data.rsi > 45 && data.rsi < 65;
    let overbought = data.rsi > 70;
    let momentum = data.stochastic > 50;
    let volatility = data.atr > 3;

    if(macdCrossUp && strongRSI && momentum && volatility){
      trend="SNIPER UPTREND"; action="BUY"; score=85;
    }
    else if(macdCrossDown && overbought && volatility){
      trend="SNIPER DOWNTREND"; action="SELL"; score=85;
    }
    else{
      trend="NO SETUP"; action="WAIT"; score=40;
    }
  }

  return {...data, trend, action, score};
}

/* 🎯 UI RENDER */
function renderBar(){
  let bar=document.getElementById("score-bar");
  bar.innerHTML="";

  Object.keys(signals).forEach(sym=>{
    let d=signals[sym];

    let div=document.createElement("div");
    div.className="box";

    div.innerText=`${sym} ${d.action} (${Math.round(d.score)})`;

    div.style.background =
      mode==="sniper"
      ? "#0ea5e9"
      : (d.action==="BUY"?"#14532d":"#7f1d1d");

    div.onclick=()=>setSymbol(sym);

    bar.appendChild(div);
  });
}

/* 🔥 HEATMAP GRID */
function renderHeatmap(){
  let map=document.getElementById("heatmap");
  map.innerHTML="";

  Object.keys(signals).forEach(sym=>{
    let d=signals[sym];

    let t=document.createElement("div");
    t.className="tile";

    t.innerText=`${sym}\nRSI:${Math.round(d.rsi)}`;

    t.style.background =
      d.rsi>70?"#7f1d1d":
      d.rsi<30?"#14532d":
      "#78350f";

    t.onclick=()=>setSymbol(sym);

    map.appendChild(t);
  });

  renderHeatmapValues();
}

/* 🧩 GRID DETAILS */
function renderHeatmapValues(){
  let container=document.getElementById("heatmap-values");
  container.innerHTML="";

  Object.keys(signals).forEach(sym=>{
    let s=signals[sym];

    let div=document.createElement("div");
    div.className="heat-cell";

    if(mode==="sniper" && s.action!=="WAIT"){
      div.classList.add("sniper");
    }

    div.innerHTML=`
      <strong>${sym}</strong>
      RSI:${Math.round(s.rsi)} | STOCH:${Math.round(s.stochastic)}
      <br>${s.trend}
    `;

    div.onclick=()=>setSymbol(sym);

    container.appendChild(div);
  });
}

/* 🚨 ALERT SYSTEM (NO OVERLAP) */
function processAlerts(){
  if(showingAlert || alertQueue.length===0) return;

  showingAlert=true;

  let a=alertQueue.shift();

  let div=document.createElement("div");
  div.className="alert";

  div.style.background =
    mode==="sniper"
    ? "#0ea5e9"
    : (a.action==="BUY"?"#14532d":"#7f1d1d");

  div.innerText=`${a.action} ${a.sym}
RSI:${Math.round(a.rsi)} | ${a.trend}`;

  div.onclick=()=>setSymbol(a.sym);

  document.body.appendChild(div);

  setTimeout(()=>{
    div.remove();
    showingAlert=false;
    processAlerts();
  },3000);
}

/* 📊 CHART */
function loadChart(){
  document.getElementById("tv_chart").innerHTML="";

  widget=new TradingView.widget({
    width:"100%",
    height:600,
    symbol:symbol,
    interval:tf,
    theme:"dark",
    style:"1",
    container_id:"tv_chart",
    studies:[
      "MACD@tv-basicstudies",
      "RSI@tv-basicstudies",
      "Stochastic@tv-basicstudies",
      "MAExp@tv-basicstudies"
    ]
  });
}

function setSymbol(s){
  symbol=s;
  loadChart();
}

function setMode(m){
  mode=m;
}

/* 🚀 MAIN LOOP */
async function update(){

  let batch = getBatch();

  for(let sym of batch){

    let data = await fetchData(sym);
    if(!data) continue;

    let s = computeSignal(data);
    signals[sym]=s;

    let now=Date.now();

    if(s.action!=="WAIT" && (!lastAlertTime[sym] || now-lastAlertTime[sym]>60000)){
      alertQueue.push({sym,...s});
      lastAlertTime[sym]=now;
    }
  }

  renderBar();
  renderHeatmap();
  processAlerts();
}

/* 🚀 START */
loadChart();
update();

/* ⏱️ SAFE INTERVAL */
setInterval(update, 20000);
</script>
