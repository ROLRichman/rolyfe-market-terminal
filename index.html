<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://s3.tradingview.com/tv.js"></script>

<style>
body{background:#020617;color:#e2e8f0;font-family:Arial;margin:0}
#app{padding:12px}

select,input{padding:8px;border-radius:6px;background:#111;color:#fff;border:none}
button{padding:8px;border:none;border-radius:6px;background:#00ff88;color:#000;font-weight:bold}

.row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px}

.box{padding:6px;background:#111;border-radius:6px;font-size:12px;cursor:pointer}
.tile{width:70px;height:70px;background:#111;border-radius:6px;font-size:11px;display:flex;align-items:center;justify-content:center;flex-direction:column}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
gap:6px;
max-height:320px;
overflow-y:auto;
}

.cell{
background:#111;
padding:8px;
border-radius:6px;
font-size:12px;
line-height:1.4;
}

.link-green{color:#00ff88;text-decoration:none}
.link-green:hover{text-shadow:0 0 6px #00ff88}

.alert{
position:fixed;
right:10px;
top:60px;
padding:10px;
border-radius:8px;
font-weight:bold;
z-index:999;
animation:pop 0.4s;
}
@keyframes pop{from{transform:scale(.7)}to{transform:scale(1)}}

</style>
</head>

<body>
<div id="app">

<!-- TOP CONTROLS -->
<div class="row">
<select id="symbol-select"></select>

<select id="sector">
<option>All</option>
<option>Tech</option>
<option>Finance</option>
<option>Energy</option>
<option>Crypto</option>
<option>Forex</option>
</select>

<select onchange="mode=this.value">
<option value="live">LIVE MODE</option>
<option value="sniper">SNIPER MODE</option>
</select>

<select onchange="tf=this.value;loadChart()">
<option value="5">5m</option>
<option value="15">15m</option>
<option value="240">4H</option>
<option value="D">DAY</option>
</select>
</div>

<!-- SEARCH -->
<input placeholder="Search Symbol..." oninput="filter(this.value)">

<!-- SCORE BAR -->
<div id="score-bar" class="row"></div>

<!-- MAIN CHART -->
<div id="chart" style="height:400px;margin-top:10px"></div>

<!-- OPTIONS -->
<button onclick="toggleOptions()">💥 Show Options Ladder</button>
<div id="options"></div>

<!-- HEATMAP -->
<h3>Heatmap</h3>
<div id="heatmap" class="row"></div>

<h4>Heatmap Values</h4>
<div id="heatmap-values" class="grid"></div>

<!-- SECOND CHART -->
<h3>Market Multi-Chart</h3>
<div id="chart2" style="height:350px"></div>

<!-- LINKS -->
<h4>Market & Tools</h4>
<ul>
<li><a class="link-green" href="https://stockcharts.com/freecharts/perf.php?$COMPQ,iwm,$INDU,$SPX" target="_blank">Major Market</a></li>
<li><a class="link-green" href="https://stockcharts.com/freecharts/perf.php?SPY,XLY,XLC,XLK,XLI,XLB,XLE,XLP,XLV,XLU,XLF" target="_blank">Sector Rotation</a></li>
<li><a class="link-green" href="https://finviz.com/screener.ashx?v=211&f=sh_avgvol_o2000,sh_opt_optionshort" target="_blank">FinViz Screener</a></li>
<li><a class="link-green" href="https://finance.yahoo.com/" target="_blank">Yahoo Finance</a></li>
</ul>

</div>

<script>

// API KEYS
const FINNHUB_KEY="YOUR_KEY";
const ALPHA_KEY="YOUR_KEY";

// STATE
let symbol="AAPL";
let tf="15";
let mode="live";

const watchlist=["AAPL","TSLA","NVDA","SPY","QQQ","MSFT","AMZN","META","GOOGL","BAC","C","AMD","PLTR","COIN","SHOP","TSM","NFLX","IWM","XLE","XLF","BTCUSD","ETHUSD","EURUSD","GBPUSD"];

let signals={};

// LOAD SYMBOLS
window.onload=()=>{
let sel=document.getElementById("symbol-select");
watchlist.forEach(s=>{
let o=document.createElement("option");
o.value=s;o.text=s;
sel.appendChild(o);
});
loadChart();
loadChart2();
loop();
};

// FILTER
function filter(v){
document.querySelectorAll("#symbol-select option").forEach(o=>{
o.style.display=o.value.includes(v.toUpperCase())?"block":"none";
});
}

// CHARTS
function loadChart(){
document.getElementById("chart").innerHTML="";
new TradingView.widget({
container_id:"chart",
symbol:symbol,
interval:tf,
theme:"dark",
studies:["RSI@tv-basicstudies","MACD@tv-basicstudies"]
});
}

function loadChart2(){
document.getElementById("chart2").innerHTML="";
new TradingView.widget({
container_id:"chart2",
symbol:"BTCUSD",
interval:"15",
theme:"dark"
});
}

// DATA
async function getRSI(sym){
let r=await fetch(`https://www.alphavantage.co/query?function=RSI&symbol=${sym}&interval=5min&time_period=14&series_type=close&apikey=${ALPHA_KEY}`);
let d=await r.json();
let key=Object.keys(d["Technical Analysis: RSI"]||{})[0];
return key?parseFloat(d["Technical Analysis: RSI"][key].RSI):50;
}

async function getPrice(sym){
let r=await fetch(`https://finnhub.io/api/v1/quote?symbol=${sym}&token=${FINNHUB_KEY}`);
let d=await r.json();
return d.c||0;
}

// SIGNAL
async function buildSignal(sym){
let rsi=await getRSI(sym);
let price=await getPrice(sym);

let action="WAIT",trend="NO SETUP";

if(mode==="live"){
if(rsi<30){action="BUY";trend="UPTREND";}
if(rsi>70){action="SELL";trend="DOWNTREND";}
}

if(mode==="sniper"){
if(rsi<25){action="BUY";trend="SNIPER";}
if(rsi>75){action="SELL";trend="SNIPER";}
}

signals[sym]={rsi,price,action,trend};

if(action!=="WAIT") fireAlert(sym,action,rsi);

}

// RENDER
function render(){

let bar=document.getElementById("score-bar");
let heat=document.getElementById("heatmap");
let grid=document.getElementById("heatmap-values");

bar.innerHTML="";
heat.innerHTML="";
grid.innerHTML="";

Object.keys(signals).forEach(s=>{
let d=signals[s];

// BAR
let b=document.createElement("div");
b.className="box";
b.innerHTML=`${s}<br>${d.action}<br>${Math.round(d.rsi)}`;
b.onclick=()=>{symbol=s;loadChart();}
bar.appendChild(b);

// TILE
let t=document.createElement("div");
t.className="tile";
t.innerText=s+"\n"+Math.round(d.rsi);
heat.appendChild(t);

// GRID
let c=document.createElement("div");
c.className="cell";
c.innerHTML=`
<b>${s}</b><br>
RSI:${Math.round(d.rsi)}<br>
${d.trend}<br>
${d.action}
`;
grid.appendChild(c);

});
}

// ALERTS
function fireAlert(sym,act,rsi){
let div=document.createElement("div");
div.className="alert";
div.style.background=act==="BUY"?"#14532d":"#7f1d1d";
div.innerText=`${act} ${sym} RSI:${Math.round(rsi)}`;
document.body.appendChild(div);
setTimeout(()=>div.remove(),3000);
}

// OPTIONS
function toggleOptions(){
let o=document.getElementById("options");
o.innerHTML="";

for(let i=0;i<5;i++){
let d=document.createElement("div");
d.className="box";
d.innerText=`CALL ${100+i*5} $${(Math.random()*3).toFixed(2)}`;
o.appendChild(d);
}
}

// LOOP
async function loop(){
for(let s of watchlist){
await buildSignal(s);
}
render();
setTimeout(loop,20000);
}

</script>
</body>
</html>
