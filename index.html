<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://s3.tradingview.com/tv.js"></script>

<style>
body{
background:linear-gradient(#020617,#022c22,#020617);
color:#e2e8f0;
font-family:Arial;
margin:0;
}

#app{padding:12px}

.topbar{
position:sticky;
top:0;
background:#020617;
padding:10px;
z-index:1000;
border-bottom:1px solid #111;
}

.section{
margin-top:18px;
padding:12px;
background:#0b0f1a;
border-radius:12px;
}

.stack{display:flex;flex-direction:column;gap:12px}

button,select,input{
padding:8px;
border-radius:6px;
background:#111;
color:#fff;
border:none;
margin:4px;
}

button{
background:#00ff88;
color:#000;
font-weight:bold;
cursor:pointer;
}

#chart,#chart2{
height:420px;
margin-top:10px;
}

/* HEATMAP */
.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
gap:8px;
}

.cell{
background:#111;
padding:8px;
border-radius:6px;
cursor:pointer;
text-align:center;
transition:0.2s;
}

.cell:hover{transform:scale(1.05)}

.buy{box-shadow:0 0 10px #00ff88}
.sell{box-shadow:0 0 10px #8b0000}

/* ALERTS */
.alert{
position:fixed;
right:10px;
padding:10px;
border-radius:8px;
font-weight:bold;
z-index:999;
background:#000;
color:#fff;
}

/* OPTIONS */
.option-box{
background:#111;
padding:8px;
border-radius:6px;
margin:4px 0;
}
</style>
</head>

<body>
<div id="app">

<h2>🔥 RO’Lyfe Sniper Terminal</h2>

<!-- CONTROLS -->
<div class="topbar">
<select id="symbol-select"></select>

<select onchange="mode=this.value">
<option value="live">LIVE</option>
<option value="sniper">SNIPER</option>
</select>

<select onchange="tf=this.value;loadChart()">
<option value="5">5m</option>
<option value="15">15m</option>
<option value="60">1H</option>
<option value="D">DAY</option>
</select>
</div>

<!-- VIDEO -->
<div class="section">
<iframe width="100%" height="300"
src="https://www.youtube.com/embed/S7vkiIX6yG4"
frameborder="0" allowfullscreen></iframe>
</div>

<!-- MAIN CHART -->
<div class="section">
<div id="chart"></div>
</div>

<!-- OPTIONS + CALC -->
<div class="section stack">

<button onclick="toggleOptions()">💥 Options Ladder</button>
<div id="options"></div>

<button onclick="toggleCalc()">📊 Trade Calculator</button>
<div id="calc"></div>

</div>

<!-- HEATMAP -->
<div class="section">
<h3>Market Heatmap (RSI + STOCH)</h3>
<div id="heatmap" class="grid"></div>
</div>

<!-- SECOND CHART -->
<div class="section">
<h3>Market Multi Chart</h3>

<select onchange="loadChart2(this.value)">
<option>AAPL</option>
<option>TSLA</option>
<option>NVDA</option>
<option>SPY</option>
<option>BTCUSD</option>
<option>ETHUSD</option>
<option>EURUSD</option>
<option>ES1!</option>
<option>NQ1!</option>
</select>

<div id="chart2"></div>

</div>

</div>

<script>

let symbol="AAPL";
let tf="15";
let mode="live";

const watchlist=[
"AAPL","TSLA","NVDA","SPY","QQQ","MSFT","AMZN","META",
"GOOGL","BAC","C","AMD","PLTR","COIN","SHOP","TSM",
"BTCUSD","ETHUSD","SOLUSD","XRPUSD",
"EURUSD","GBPUSD","USDJPY","ES1!","NQ1!"
];

let signals={};

window.onload=()=>{
let sel=document.getElementById("symbol-select");
watchlist.forEach(s=>{
let o=document.createElement("option");
o.value=s;o.text=s;
sel.appendChild(o);
});

loadChart();
loadChart2("AAPL");
loop();
};

/* CHART 1 */
function loadChart(){
document.getElementById("chart").innerHTML="";
new TradingView.widget({
container_id:"chart",
symbol:symbol,
interval:tf,
theme:"dark",
allow_symbol_change:true,
studies:[
"RSI@tv-basicstudies",
"MACD@tv-basicstudies",
"Stochastic@tv-basicstudies",
"MASimple@tv-basicstudies"
]
});
}

/* CHART 2 FULL INDICATORS */
function loadChart2(sym){
document.getElementById("chart2").innerHTML="";
new TradingView.widget({
container_id:"chart2",
symbol:sym,
interval:"15",
theme:"dark",
allow_symbol_change:true,
studies:[
"RSI@tv-basicstudies",
"Stochastic@tv-basicstudies",
"MASimple@tv-basicstudies",
"MASimple@tv-basicstudies",
"MASimple@tv-basicstudies"
]
});
}

/* SIGNAL ENGINE */
function buildSignal(sym){
let rsi=Math.random()*100;
let stoch=Math.random()*100;

let action="WAIT";

if(mode==="sniper"){
if(rsi<25 && stoch<20) action="BUY";
if(rsi>75 && stoch>80) action="SELL";
}else{
if(rsi<30) action="BUY";
if(rsi>70) action="SELL";
}

signals[sym]={rsi,stoch,action};

if(action!=="WAIT"){
fireAlert(sym,action,rsi,stoch);
}
}

/* HEATMAP */
function render(){
let map=document.getElementById("heatmap");
map.innerHTML="";

Object.keys(signals).forEach(s=>{
let d=signals[s];

let div=document.createElement("div");
div.className="cell "+(d.action==="BUY"?"buy":d.action==="SELL"?"sell":"");

div.innerHTML=`
<b>${s}</b><br>
${d.action}<br>
RSI:${Math.round(d.rsi)}<br>
ST:${Math.round(d.stoch)}
`;

div.onclick=()=>{
symbol=s;
loadChart();
};

map.appendChild(div);
});
}

/* ALERTS */
function fireAlert(sym,act,rsi,stoch){
let div=document.createElement("div");
div.className="alert";
div.style.top=(60+document.querySelectorAll(".alert").length*60)+"px";
div.style.color=act==="BUY"?"#00ff88":"#ff4444";

div.innerHTML=`
${act} ${sym}<br>
RSI:${Math.round(rsi)} STO:${Math.round(stoch)}
`;

document.body.appendChild(div);
setTimeout(()=>div.remove(),5000);
}

/* OPTIONS */
function toggleOptions(){
let o=document.getElementById("options");
o.innerHTML="";

for(let i=0;i<5;i++){
let strike=100+i*5;
let d=document.createElement("div");
d.className="option-box";
d.innerText=`${symbol} CALL ${strike}`;
o.appendChild(d);
}
}

/* CALCULATOR */
function toggleCalc(){
let c=document.getElementById("calc");
c.innerHTML=`
Balance <input id="bal" value="500">
Risk % <input id="risk" value="5">
Entry <input id="entry" value="1.5">
Stop <input id="stop" value="1.2">

<button onclick="runCalc()">CALCULATE</button>

<div id="result"></div>
`;
}

function runCalc(){
let B=+bal.value||0;
let R=+risk.value/100||0;
let E=+entry.value||0;
let S=+stop.value||0;

let riskAmt=B*R;
let diff=Math.abs(E-S)||1;

let qty=Math.floor(riskAmt/diff);

let t1=E+diff;
let t2=E+2*diff;
let t3=E+3*diff;

result.innerHTML=`
Qty:${qty}<br>
Risk:$${riskAmt.toFixed(2)}<br>
T1:${t1.toFixed(2)}<br>
T2:${t2.toFixed(2)}<br>
T3:${t3.toFixed(2)}
`;
}

/* LOOP */
function loop(){
watchlist.forEach(s=>buildSignal(s));
render();
setTimeout(loop,12000);
}

</script>
</body>
</html>
