<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RO'Lyfe Terminal</title>
<script src="https://s3.tradingview.com/tv.js"></script>

<style>
body{margin:0;background:#020617;color:#e2e8f0;font-family:Arial}
#rolyfe{padding:10px}
.box{padding:6px;border-radius:6px;margin:3px;cursor:pointer;font-size:12px}
.alert{position:fixed;top:70px;right:15px;padding:10px;border-radius:8px;color:#fff}
.option{background:#111827;padding:6px;margin:3px;border-radius:6px;cursor:pointer}
</style>
</head>

<body>
<div id="rolyfe">

<h2 style="text-align:center">🔥 RO'Lyfe Terminal</h2>

<div style="display:flex;flex-wrap:wrap;gap:10px">

<div id="tv" style="flex:2;height:400px"></div>

<div style="flex:1">
<div id="gauge" style="height:190px"></div>
<div id="news" style="height:190px"></div>
</div>

</div>

<div id="scoreBar"></div>

<h3>Options Chain</h3>
<div id="options"></div>

<h3>Account</h3>
<input id="bal" value="500">
<input id="risk" value="5">
<input id="stop" value="25">
<button onclick="calc()">RUN</button>

<div id="ladder"></div>

<h3>Watchlist</h3>
<div id="wl"></div>

<h3>Trade Log</h3>
<div id="log"></div>

</div>

<script>
const API="demo";
let current="AAPL";
let signals={};
let alertQueue=[];

/* ---------- SIGNAL ---------- */
function compute(d){
let action="WAIT";
if(d.rsi>60 && d.macd>d.signal) action="BUY";
if(d.rsi>70 && d.macd<d.signal) action="SELL";
return {...d,action};
}

/* ---------- DATA ---------- */
function fakeData(){
return {
rsi:Math.random()*100,
macd:Math.random(),
signal:Math.random()
};
}

/* ---------- RENDER ---------- */
function renderBar(){
let bar=document.getElementById("scoreBar");
bar.innerHTML="";

Object.keys(signals).forEach(sym=>{
let s=signals[sym];

let div=document.createElement("div");
div.className="box";
div.style.background=s.action==="BUY"?"green":s.action==="SELL"?"red":"gray";

div.innerHTML=`
<b>${sym}</b> ${s.action}<br>
RSI:${Math.round(s.rsi)}
<br>${s.option?`$${s.option.last} Δ:${s.option.delta}`:""}
`;

div.onclick=()=>setSym(sym);

bar.appendChild(div);
});
}

/* ---------- OPTIONS ---------- */
function genOptions(){
let o=document.getElementById("options");
o.innerHTML="";

["CALL","PUT"].forEach(t=>{
for(let i=0;i<3;i++){
let strike=100+Math.floor(Math.random()*50);

let div=document.createElement("div");
div.className="option";
div.innerText=`${t} ${strike}`;

div.onclick=()=>{
signals[current].option={
last:(Math.random()*5).toFixed(2),
delta:(Math.random()).toFixed(2)
};
renderBar();
calc();
};

o.appendChild(div);
}
});
}

/* ---------- ACCOUNT ---------- */
function calc(){
let B=+bal.value;
let R=risk.value/100;
let S=stop.value/100;

let contracts=Math.floor((B*R)/(1*S))||1;

ladder.innerHTML=`Contracts: ${contracts}`;
}

/* ---------- ALERT ---------- */
function alertPop(a){
let d=document.createElement("div");
d.className="alert";
d.style.background=a==="BUY"?"green":"red";
d.innerText=a;
document.body.appendChild(d);
setTimeout(()=>d.remove(),2000);
}

/* ---------- WATCHLIST ---------- */
const wl=["AAPL","TSLA","NVDA","SPY"];

function renderWL(){
let w=document.getElementById("wl");
w.innerHTML="";

wl.forEach(s=>{
let div=document.createElement("div");
div.className="box";
div.innerText=s;
div.onclick=()=>setSym(s);
w.appendChild(div);
});
}

/* ---------- CHART ---------- */
function loadChart(s){
tv.innerHTML="";
new TradingView.widget({
container_id:"tv",
symbol:s,
theme:"dark",
width:"100%",
height:400
});
}

/* ---------- SET SYMBOL ---------- */
function setSym(s){
current=s;
loadChart(s);
genOptions();
}

/* ---------- LOOP ---------- */
function loop(){
wl.forEach(sym=>{
let d=fakeData();
let s=compute(d);
signals[sym]=s;

if(s.action!=="WAIT"){
alertPop(s.action);
}
});

renderBar();
}

setInterval(loop,4000);

/* ---------- INIT ---------- */
renderWL();
setSym("AAPL");
loop();
</script>
</body>
</html>
