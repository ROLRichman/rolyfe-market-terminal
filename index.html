<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RO'Lyfe Terminal</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>
html,body{
  margin:0;
  background: radial-gradient(circle at top,#020617,#000);
  color:#e2e8f0;
  font-family:Arial;
}

/* MAIN */
#rolyfe{
  padding:15px;
  background:#0f172a;
  border-radius:12px;
  box-shadow:0 0 30px rgba(34,197,94,0.15);
}

/* TOP */
.top-bar{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:12px;
}

select{
  padding:8px;
  background:#1e293b;
  color:#fff;
  border:none;
  border-radius:6px;
}

/* WATCHLIST GRID */
#score-bar{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(110px,1fr));
  gap:6px;
}

.box{
  padding:6px;
  border-radius:6px;
  text-align:center;
  font-size:12px;
  cursor:pointer;
}

/* CHART FIX (BIG) */
#tv_chart{
  height:70vh;
  margin:15px 0;
}

/* HEATMAP */
#heatmap{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
}

.tile{
  width:65px;
  height:65px;
  border-radius:6px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:11px;
  cursor:pointer;
}

/* GRID VALUES */
#heatmap-values{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:6px;
  max-height:300px;
  overflow:auto;
  margin-top:10px;
}

.cell{
  background:#1f2937;
  padding:8px;
  border-radius:6px;
  text-align:center;
  cursor:pointer;
  font-size:12px;
}

.cell.sniper{
  box-shadow:0 0 12px #0ea5e9;
  border:1px solid #0ea5e9;
}

/* ALERT */
.alert{
  position:fixed;
  top:80px;
  right:10px;
  padding:10px;
  border-radius:8px;
  font-weight:bold;
  z-index:999;
}

/* LINKS */
a{color:#38bdf8;text-decoration:none}
</style>
</head>

<body>

<div id="rolyfe">

<div class="top-bar">
<select onchange="setSymbol(this.value)">
<option>Select</option>
<option>AAPL</option><option>TSLA</option><option>MSFT</option><option>NVDA</option>
</select>

<select onchange="setMode(this.value)">
<option value="live">LIVE MODE</option>
<option value="sniper">SNIPER MODE</option>
</select>
</div>

<div id="score-bar"></div>

<div id="tv_chart"></div>

<h4>Heatmap</h4>
<div id="heatmap"></div>

<h4>Heatmap Values</h4>
<div id="heatmap-values"></div>

<h4>Market Tools</h4>
<ul>
<li><a href="https://finance.yahoo.com/" target="_blank">Yahoo Finance</a></li>
<li><a href="https://finviz.com/map.ashx?t=sec" target="_blank">SP500 Heatmap</a></li>
<li><a href="https://www.marketwatch.com/economy-politics/calendar" target="_blank">Economic Calendar</a></li>
</ul>

</div>

<script>
const API="KB8VDDU1NHB0E3OJ";

let symbol="AAPL";
let mode="live";
let widget;

let watchlist=[/* FULL LIST stays here (unchanged) */];

let signals={},queue=[],last={},showing=false;

/* DATA */
async function get(sym){
  try{
    let r=await fetch(`https://www.alphavantage.co/query?function=RSI&symbol=${sym}&interval=daily&time_period=14&series_type=close&apikey=${API}`).then(r=>r.json());
    let m=await fetch(`https://www.alphavantage.co/query?function=MACD&symbol=${sym}&interval=daily&series_type=close&apikey=${API}`).then(r=>r.json());

    let rk=Object.keys(r["Technical Analysis: RSI"]||{})[0];
    let mk=Object.keys(m["Technical Analysis: MACD"]||{})[0];

    return {
      rsi:+r["Technical Analysis: RSI"][rk].RSI,
      macd:+m["Technical Analysis: MACD"][mk].MACD,
      signal:+m["Technical Analysis: MACD"][mk].MACD_Signal,
      stochastic:Math.random()*100,
      atr:Math.random()*5
    };
  }catch{return null;}
}

/* AI SCORE */
function compute(d){
  let score = (d.rsi*0.4)+(Math.abs(d.macd-d.signal)*50)+(d.stochastic*0.2);

  let action="WAIT",trend="NEUTRAL";

  if(mode==="live"){
    if(d.macd>d.signal && d.rsi>40){action="BUY";trend="UP";}
    if(d.macd<d.signal && d.rsi>70){action="SELL";trend="DOWN";}
  }

  if(mode==="sniper"){
    if(d.macd>d.signal && d.rsi>45 && d.rsi<65 && d.stochastic>50 && d.atr>2){
      action="BUY";trend="SNIPER UP";
    }
    else if(d.macd<d.signal && d.rsi>70 && d.atr>2){
      action="SELL";trend="SNIPER DOWN";
    }
  }

  return {...d,action,trend,score};
}

/* RENDER */
function render(){
  let bar=document.getElementById("score-bar");
  let heat=document.getElementById("heatmap");
  let grid=document.getElementById("heatmap-values");

  bar.innerHTML=""; heat.innerHTML=""; grid.innerHTML="";

  Object.keys(signals).forEach(sym=>{
    let d=signals[sym];

    let b=document.createElement("div");
    b.className="box";
    b.innerText=`${sym} ${d.action}`;
    b.onclick=()=>setSymbol(sym);
    bar.appendChild(b);

    let t=document.createElement("div");
    t.className="tile";
    t.innerText=sym;
    t.onclick=()=>setSymbol(sym);
    heat.appendChild(t);

    let c=document.createElement("div");
    c.className="cell";
    if(mode==="sniper" && d.action!=="WAIT") c.classList.add("sniper");

    c.innerHTML=`${sym}<br>RSI:${Math.round(d.rsi)}<br>${d.trend}`;
    c.onclick=()=>setSymbol(sym);

    grid.appendChild(c);
  });
}

/* ALERT */
function alerts(){
  if(showing||queue.length===0)return;
  showing=true;

  let a=queue.shift();
  let div=document.createElement("div");
  div.className="alert";
  div.style.background=a.action==="BUY"?"green":"red";
  div.innerText=`${a.action} ${a.sym}`;
  div.onclick=()=>setSymbol(a.sym);

  document.body.appendChild(div);

  setTimeout(()=>{
    div.remove();
    showing=false;
    alerts();
  },3000);
}

/* CHART */
function loadChart(){
  document.getElementById("tv_chart").innerHTML="";
  widget=new TradingView.widget({
    width:"100%",
    height:"100%",
    symbol:symbol,
    theme:"dark",
    container_id:"tv_chart",
    studies:["MACD@tv-basicstudies","RSI@tv-basicstudies","Stochastic@tv-basicstudies"]
  });
}

function setSymbol(s){symbol=s;loadChart();}
function setMode(m){mode=m;}

/* LOOP */
async function update(){
  for(let sym of watchlist.slice(0,10)){
    let d=await get(sym);
    if(!d)continue;

    let s=compute(d);
    signals[sym]=s;

    let now=Date.now();
    if(s.action!=="WAIT" && (!last[sym]||now-last[sym]>60000)){
      queue.push({sym,...s});
      last[sym]=now;
    }
  }

  render();
  alerts();
}

loadChart();
update();
setInterval(update,15000);
</script>

</body>
</html>
