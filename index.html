<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://s3.tradingview.com/tv.js"></script>

<style>
body{margin:0;background:#03140f;color:#e2e8f0;font-family:Arial}
#app{padding:12px}

.section{margin-bottom:20px;padding:12px;background:#071c16;border-radius:12px}

.row{display:flex;gap:8px;flex-wrap:wrap}

button,select,input{
padding:8px;border-radius:6px;border:none;
background:#0f2a22;color:#fff
}

button{background:#00ff88;color:#000;font-weight:bold}

#chart,#chart2{height:400px;margin-top:10px}

.alert{
position:fixed;
right:10px;
padding:10px;
border-radius:8px;
background:#000;
color:#00ff88;
font-weight:bold;
z-index:999;
}

.list{max-height:200px;overflow:auto}
.link{color:#00ff88;text-decoration:none}
</style>
</head>

<body>
<div id="app">

<h2 style="text-align:center">RO’Lyfe Terminal — Live Sniper Intelligence Engine</h2>

<!-- CONTROLS -->
<div class="section">
<div class="row">
<select id="symbol"></select>

<select id="mode">
<option value="live">LIVE</option>
<option value="sniper">SNIPER</option>
</select>

<select id="tf">
<option value="5">5m</option>
<option value="15">15m</option>
<option value="240">4H</option>
<option value="D">DAY</option>
</select>
</div>
</div>

<!-- VIDEO -->
<div class="section">
<iframe width="100%" height="250"
src="https://www.youtube.com/embed/S7vkiIX6yG4"
frameborder="0" allowfullscreen></iframe>
</div>

<!-- MAIN CHART -->
<div class="section">
<div id="chart"></div>
</div>

<!-- OPTIONS -->
<div class="section">
<button onclick="toggleOptions()">💥 Options Ladder</button>
<div id="options"></div>
</div>

<!-- CALCULATOR -->
<div class="section">
<button onclick="toggleCalc()">📊 Trade Calculator</button>
<div id="calc"></div>
</div>

<!-- SECOND CHART -->
<div class="section">
<h3>Market Multi Chart</h3>
<div id="chart2"></div>
</div>

<!-- WATCHLIST -->
<div class="section">
<h3>Watchlists</h3>
<div class="list" id="watch"></div>
</div>

<!-- LINKS -->
<div class="section">
<h3>Market Tools</h3>
<a class="link" target="_blank" href="https://stockcharts.com/freecharts/perf.php?$COMPQ,iwm,$INDU,$SPX">Major Market</a><br>
<a class="link" target="_blank" href="https://stockcharts.com/freecharts/perf.php?SPY,XLY,XLC,XLK,XLI,XLB,XLE,XLP,XLV,XLU,XLF">Sector Rotation</a><br>
<a class="link" target="_blank" href="https://finviz.com/">FinViz</a><br>
<a class="link" target="_blank" href="https://finance.yahoo.com/">Yahoo Finance</a><br>
<a class="link" target="_blank" href="https://www.marketwatch.com/economy-politics/calendar">Economic Calendar</a><br>
<a class="link" target="_blank" href="https://finviz.com/map.ashx">Heatmap</a><br>
<a class="link" target="_blank" href="https://www.cmegroup.com/markets/interest-rates/cme-fedwatch-tool.html">FedWatch</a>
</div>

</div>

<script>

let symbols=[
"AAPL","TSLA","NVDA","SPY","QQQ","MSFT","AMZN","META","GOOGL",
"BTCUSD","ETHUSD","SOLUSD","XRPUSD",
"EURUSD","GBPUSD","USDJPY",
"ES1!","NQ1!"
];

let sym="AAPL";

window.onload=()=>{
let s=document.getElementById("symbol");
symbols.forEach(x=>{
let o=document.createElement("option");
o.value=x;o.text=x;
s.appendChild(o);
});

loadChart();
loadChart2();
renderList();
loop();
};

function loadChart(){
new TradingView.widget({
container_id:"chart",
symbol:sym,
interval:tf.value,
theme:"dark",
allow_symbol_change:true,
studies:[
"RSI@tv-basicstudies",
"MACD@tv-basicstudies",
"Stochastic@tv-basicstudies",
"MASimple@tv-basicstudies"
]
});
}

function loadChart2(){
new TradingView.widget({
container_id:"chart2",
symbol:"BTCUSD",
interval:"15",
theme:"dark",
studies:["MASimple@tv-basicstudies"]
});
}

function renderList(){
let w=document.getElementById("watch");
symbols.forEach(s=>{
let d=document.createElement("div");
d.innerText=s;
d.onclick=()=>{sym=s;loadChart();}
w.appendChild(d);
});
}

function toggleOptions(){
let o=document.getElementById("options");
o.innerHTML="CALL 100 | PUT 105 | IV 32 | Δ 0.6";
}

function toggleCalc(){
let c=document.getElementById("calc");
c.innerHTML=`
Balance <input id="b" value="500">
Risk % <input id="r" value="5">
Entry <input id="e" value="1.5">
Stop <input id="s" value="1.2">
<button onclick="calc()">GO</button>
<div id="res"></div>
`;
}

function calc(){
let B=+b.value;
let R=+r.value/100;
let E=+e.value;
let S=+s.value;

let risk=B*R;
let per=Math.abs(E-S);
let qty=Math.floor(risk/per);

res.innerHTML=`
Qty:${qty}<br>
Risk:$${risk}<br>
T1:${E+per}<br>
T2:${E+2*per}<br>
T3:${E+3*per}
`;
}

function alertBox(t){
let d=document.createElement("div");
d.className="alert";
d.style.top=(60+document.querySelectorAll(".alert").length*60)+"px";
d.innerText=t;
document.body.appendChild(d);
setTimeout(()=>d.remove(),4000);
}

function loop(){
symbols.forEach(s=>{
let rsi=Math.random()*100;

if(mode.value==="sniper"){
if(rsi<25) alertBox("BUY "+s);
if(rsi>75) alertBox("SELL "+s);
}else{
if(rsi<30) alertBox("BUY "+s);
if(rsi>70) alertBox("SELL "+s);
}
});

setTimeout(loop,15000);
}

</script>
</body>
</html>
