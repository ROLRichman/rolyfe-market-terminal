<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RO'Lyfe Market Terminal</title>
<script src="https://s3.tradingview.com/tv.js"></script>

<style>
html, body {
  margin:0;
  padding:0;
  background: radial-gradient(circle at top, #020617, #020617 40%, #000000);
  color:#e2e8f0;
  font-family:Arial, sans-serif;
  min-height:100vh;
}
#rolyfe{
  background:#0f172a;
  padding:15px;
  border-radius:12px;
  box-shadow:0 0 40px rgba(34,197,94,0.15);
  position:relative;
  overflow:hidden;
}

/* 🎄 Christmas Lights Glow */
@keyframes glow {0%,100%{box-shadow:0 0 10px #facc15}25%{box-shadow:0 0 20px #16a34a}50%{box-shadow:0 0 25px #dc2626}75%{box-shadow:0 0 20px #38bdf8}}
#rolyfe::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;border-radius:12px;pointer-events:none;animation:glow 3s infinite;}

.top-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:15px}
select{padding:8px;border-radius:6px;background:#1e293b;color:#fff;border:none}
#score-bar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.box{padding:6px 10px;border-radius:6px;font-size:12px;font-weight:bold;cursor:pointer}
#tv_chart{margin-bottom:15px}
#heatmap{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.tile{width:65px;height:65px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold;cursor:pointer}
.alert{position:fixed;top:60px;right:15px;padding:10px 14px;border-radius:8px;color:#fff;font-weight:bold;z-index:999;opacity:0.95;transition:all 0.4s}
h4,h5{margin:8px 0 4px 0;}
a{color:#38bdf8;text-decoration:none}
a:hover{text-decoration:underline}

/* ---------- Heatmap Values Grid ---------- */
#heatmap-values{
  display:grid;
  grid-template-columns: repeat(auto-fill,minmax(150px,1fr));
  gap:6px;
  max-height:300px;
  overflow-y:auto;
  padding:6px;
  border-radius:6px;
  background:#111827;
}
.heat-cell{
  background:#1f2937;
  padding:8px;
  border-radius:6px;
  font-size:12px;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s all;
  display:flex;
  flex-direction:column;
  text-align:center;
}
.heat-cell.sniper{box-shadow:0 0 10px #0ea5e9;border:1px solid #0ea5e9;}
.heat-cell:hover{transform:scale(1.05);box-shadow:0 0 12px #38bdf8;}
</style>
</head>
<body>
<div id="rolyfe">
  <div class="top-bar">
    <select onchange="setSymbol(this.value)">
      <option value="">Select Symbol</option>
      <option>AAPL</option><option>TSLA</option><option>MSFT</option><option>NVDA</option>
    </select>
    <select onchange="setMode(this.value)">
      <option value="live">LIVE MODE</option>
      <option value="sniper">SNIPER MODE</option>
    </select>
  </div>

  <div id="score-bar"></div>
  <div id="tv_chart"></div>

  <h4>Heatmap</h4>
  <div id="heatmap"></div>

  <h5>Heatmap Values (Auto-update)</h5>
  <div id="heatmap-values"></div>

  <h5>Market & Tools Links</h5>
  <ul>
    <li><a href="https://stockcharts.com/freecharts/perf.php?$COMPQ,iwm,$INDU,$SPX" target="_blank">Market Posture - Major Market Analysis</a></li>
    <li><a href="https://stockcharts.com/freecharts/perf.php?SPY,XLY,XLC,XLK,XLI,XLB,XLE,XLP,XLV,XLU,XLF" target="_blank">Market Posture - Sector Rotation</a></li>
    <li><a href="https://finviz.com/screener.ashx?v=211&f=sh_avgvol_o2000,sh_opt_optionshort,sh_price_o10,ta_sma200_pa,ta_sma50_pa&o=-perf4w" target="_blank">FinViz Bullish Screener</a></li>
    <li><a href="https://www.marketwatch.com/economy-politics/calendar" target="_blank">MarketWatch Economic Calendar</a></li>
    <li><a href="https://finviz.com/map.ashx?t=sec" target="_blank">S&P 500 Heat Map</a></li>
    <li><a href="https://www.cmegroup.com/markets/interest-rates/cme-fedwatch-tool.html" target="_blank">The FedWatch - Interest Rate Tool</a></li>
    <li><a href="https://finance.yahoo.com/" target="_blank">Yahoo! Finance</a></li>
  </ul>
</div>

<script>
// Symbols, signals, modes
let symbol="AAPL", tf="D", widget, mode="live";
const watchlist=["AAPL","AMKR","AMZN","APH","ASX","AVGO","AXP","BAC","BK","C","CAT","CIEN","CLS","COHR","CRDO","CSCO","DAL","DIA","FOXA","FSLR","GEGLD","GM","GOOGL","GS","GTX","HWM","IBM","INTC","IWM","JCI","JNJ","LITE","LLY","LRCX","M","MA","META","MS","MSFT","MU","NFLX","NVDANXT","PLTR","QQQ","REAL","RKLB","ROKU","ROST","RTX","SLV","SNDK","SOFI","SPY","STX","TER","TJX","TSLA","TSM","UUP","VIX","W","WBD","WDC","WMT","XLB","XLC","XLE","XLF","XLI","XLK","XLP","XLU","XLV","XLY"];
let signals={}, lastAlertTime={}, alertQueue=[], showingAlert=false;

// Signal logic (live + sniper)
function computeSignal(data){
  let trend="NEUTRAL", action="WAIT", score=50;
  if(mode==="live"){
    if(data.macd>data.signal && data.rsi>40 && data.rsi<70){trend="UPTREND";action="BUY";}
    else if(data.macd<data.signal && data.rsi>70){trend="DOWNTREND";action="SELL";}
    score=50+Math.random()*50;
  }
  if(mode==="sniper"){
    let macdCrossUp=data.macd>data.signal, macdCrossDown=data.macd<data.signal;
    let strongRSI=data.rsi>45 && data.rsi<65, overbought=data.rsi>70, oversold=data.rsi<30;
    let momentum=data.stochastic>50, volatility=data.atr>3;
    if(macdCrossUp && strongRSI && momentum && volatility){trend="SNIPER UPTREND";action="BUY";score=80+Math.random()*20;}
    else if(macdCrossDown && overbought && volatility){trend="SNIPER DOWNTREND";action="SELL";score=80+Math.random()*20;}
    else{trend="NO SETUP";action="WAIT";score=40;}
  }
  return {...data, trend, action, score};
}

// Render dashboard
function renderBar(){let bar=document.getElementById("score-bar");bar.innerHTML="";Object.keys(signals).forEach(sym=>{let d=signals[sym];let div=document.createElement("div");div.className="box";div.innerText=`${sym} ${d.action} (${Math.round(d.score)})`;div.style.background=mode==="sniper"?"#0ea5e9":(d.action==="BUY"?"#14532d":"#7f1d1d");div.onclick=()=>setSymbol(sym);bar.appendChild(div);});}
function renderHeatmap(){let map=document.getElementById("heatmap");map.innerHTML="";let heatList="";Object.keys(signals).forEach(sym=>{let d=signals[sym];let t=document.createElement("div");t.className="tile";t.innerText=`${sym}\nRSI:${Math.round(d.rsi)}\nSTOCH:${Math.round(d.stochastic)}`;t.style.background=d.rsi>70?"#7f1d1d":d.rsi<30?"#14532d":"#78350f";t.onclick=()=>setSymbol(sym);map.appendChild(t);heatList+=`<div class="heat-cell${mode==="sniper"&&d.action!=="WAIT"?" sniper":""}" onclick="setSymbol('${sym}')">${sym} ${Math.round(d.rsi)} RSI | ${Math.round(d.stochastic)} STOCH | ${d.trend}</div>`;});document.getElementById("heatmap-values").innerHTML=heatList;}

// Floating alerts
function processAlerts(){if(showingAlert||alertQueue.length===0)return;showingAlert=true;let a=alertQueue.shift();let div=document.createElement("div");div.className="alert";div.style.background=mode==="sniper"?"#0ea5e9":(a.action==="BUY"?"#14532d":"#7f1d1d");div.innerText=`${a.action} ${a.sym}\nRSI:${Math.round(a.rsi)} | ${a.trend}`;div.onclick=()=>setSymbol(a.sym);document.body.appendChild(div);setTimeout(()=>{div.remove();showingAlert=false;processAlerts();},3000);}

// Chart
function loadChart(){document.getElementById("tv_chart").innerHTML="";widget=new TradingView.widget({width:"100%",height:500,symbol:symbol,interval:tf,theme:"dark",style:"1",container_id:"tv_chart",allow_symbol_change:true,hide_top_toolbar:false,studies:["MACD@tv-basicstudies","RSI@tv-basicstudies","Stochastic@tv-basicstudies","MAExp@tv-basicstudies"]});}

// Symbol + Mode
function setSymbol(s){symbol=s;loadChart();}
function setMode(m){mode=m;}

// Main update loop (fake for now, plug real API)
async function update(){
  for(let sym of watchlist){
    let data={rsi:Math.random()*100,macd:Math.random()*2-1,signal:Math.random()*2-1,stochastic:Math.random()*100,atr:Math.random()*5};
    let s=computeSignal(data);signals[sym]=s;
    let now=Date.now();
    if(s.action!=="WAIT" && (!lastAlertTime[sym]||now-lastAlertTime[sym]>60000)){alertQueue.push({sym,...s});lastAlertTime[sym]=now;}
  }
  renderBar();renderHeatmap();processAlerts();
}

// Initial load
loadChart();update();setInterval(update,mode==="sniper"?15000:5000);
</script>
</body>
</html>
