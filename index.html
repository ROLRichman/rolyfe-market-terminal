<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://s3.tradingview.com/tv.js"></script>

<style>
body{
margin:0;
background:#020617;
color:#e2e8f0;
font-family:Arial;
}

#app{padding:10px;max-width:100%}

/* HEADER */
h2{text-align:center}

/* TOP BAR */
.topbar{
position:sticky;
top:0;
background:#020617;
padding:10px;
z-index:1000;
border-bottom:1px solid #111;
display:flex;
flex-wrap:wrap;
gap:6px;
}

/* CONTROLS */
select,input,button{
padding:8px;
border-radius:6px;
border:none;
background:#111;
color:#fff;
}

button{
background:#00ff88;
color:#000;
font-weight:bold;
}

/* SECTIONS */
.section{
margin-top:15px;
padding:10px;
background:#0b0f1a;
border-radius:10px;
}

/* CHART FIX */
.chart-wrap{
width:100%;
overflow:hidden;
}

/* WATCHLIST */
.list{
display:flex;
flex-wrap:wrap;
gap:6px;
}

.item{
background:#111;
padding:6px;
border-radius:6px;
cursor:pointer;
font-size:12px;
}

/* HEATMAP */
.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(110px,1fr));
gap:6px;
}

.cell{
background:#111;
padding:6px;
border-radius:6px;
text-align:center;
cursor:pointer;
font-size:12px;
}

.buy{box-shadow:0 0 10px #00ff88}
.sell{box-shadow:0 0 10px #8b0000}

/* ALERT */
.alert{
position:fixed;
right:10px;
padding:10px;
background:#000;
color:#fff;
border-radius:8px;
z-index:999;
font-size:12px;
}

/* OPTIONS */
.option-box{
background:#111;
padding:6px;
margin:4px 0;
border-radius:6px;
}

/* LINKS */
.link{
color:#00ff88;
display:block;
margin:3px 0;
text-decoration:none;
}
</style>
</head>

<body>
<div id="app">

<h2>🔥 RO’Lyfe Terminal</h2>

<!-- CONTROLS -->
<div class="topbar">
<select id="symbol-select"></select>

<select onchange="mode=this.value;renderWatchlist()">
<option value="live">LIVE</option>
<option value="sniper">SNIPER</option>
</select>

<select onchange="tf=this.value;loadChart()">
<option value="5">5m</option>
<option value="15">15m</option>
<option value="60">1H</option>
<option value="D">DAY</option>
</select>
</div>

<!-- WATCHLIST / SNIPER LIST -->
<div class="section">
<h3>Market List</h3>
<div id="watch" class="list"></div>
</div>

<!-- CHART -->
<div class="section chart-wrap">
<div id="chart" style="height:350px"></div>
</div>

<!-- OPTIONS -->
<div class="section">
<button onclick="toggleOptions()">💥 Options Ladder</button>
<div id="options"></div>
</div>

<!-- CALC -->
<div class="section">
<button onclick="toggleCalc()">📊 Trade Calculator</button>
<div id="calc"></div>
</div>

<!-- HEATMAP -->
<div class="section">
<h3>Heatmap</h3>
<div id="heatmap" class="grid"></div>
</div>

<!-- SECOND CHART -->
<div class="section chart-wrap">
<h3>Multi Chart</h3>

<select onchange="loadChart2(this.value)">
<option>AAPL</option>
<option>TSLA</option>
<option>SPY</option>
<option>BTCUSD</option>
<option>EURUSD</option>
<option>ES1!</option>
<option>NQ1!</option>
</select>

<div id="chart2" style="height:300px"></div>
</div>

<!-- LINKS -->
<div class="section">
<h3>Market & Tools</h3>
<a class="link" target="_blank" href="https://stockcharts.com/freecharts/perf.php?$COMPQ,iwm,$INDU,$SPX">Major Market</a>
<a class="link" target="_blank" href="https://stockcharts.com/freecharts/perf.php?SPY,XLY,XLC,XLK,XLI,XLB,XLE,XLP,XLV,XLU,XLF">Sector Rotation</a>
<a class="link" target="_blank" href="https://finviz.com/screener.ashx?v=211">FinViz Screener</a>
<a class="link" target="_blank" href="https://finance.yahoo.com/">Yahoo Finance</a>
<a class="link" target="_blank" href="https://www.marketwatch.com/economy-politics/calendar">Economic Calendar</a>
<a class="link" target="_blank" href="https://finviz.com/map.ashx">S&P Heatmap</a>
<a class="link" target="_blank" href="https://www.cmegroup.com/markets/interest-rates/cme-fedwatch-tool.html">FedWatch</a>
</div>

</div>

<script>

let symbol="AAPL";
let tf="15";
let mode="live";

const watchlist=[
"AAPL","TSLA","NVDA","SPY","QQQ","MSFT","AMZN","META",
"GOOGL","BAC","C","AMD","PLTR","COIN","SHOP","TSM",
"BTCUSD","ETHUSD","SOLUSD","XRPUSD",
"EURUSD","GBPUSD","USDJPY",
"ES1!","NQ1!","DXY","GLD","SLV"
];

let signals={};

window.onload=()=>{
let sel=document.getElementById("symbol-select");
watchlist.forEach(s=>{
let o=document.createElement("option");
o.value=s;o.text=s;
sel.appendChild(o);
});

loadChart();
loadChart2("AAPL");
renderWatchlist();
loop();
};

/* WATCHLIST / SNIPER */
function renderWatchlist(){
let w=document.getElementById("watch");
w.innerHTML="";

watchlist.forEach(s=>{
let d=signals[s]||{action:"WAIT"};

if(mode==="sniper" && d.action==="WAIT") return;

let div=document.createElement("div");
div.className="item";
div.innerText=s+" "+d.action;

div.onclick=()=>{
symbol=s;
loadChart();
};

w.appendChild(div);
});
}

/* CHARTS */
function loadChart(){
document.getElementById("chart").innerHTML="";
new TradingView.widget({
container_id:"chart",
symbol:symbol,
interval:tf,
theme:"dark",
allow_symbol_change:true,
studies:[
"RSI@tv-basicstudies",
"MACD@tv-basicstudies",
"Stochastic@tv-basicstudies",
"MASimple@tv-basicstudies"
]
});
}

function loadChart2(sym){
document.getElementById("chart2").innerHTML="";
new TradingView.widget({
container_id:"chart2",
symbol:sym,
interval:"15",
theme:"dark",
allow_symbol_change:true,
studies:[
"RSI@tv-basicstudies",
"Stochastic@tv-basicstudies",
"MASimple@tv-basicstudies",
"MASimple@tv-basicstudies",
"MASimple@tv-basicstudies"
]
});
}

/* SIGNALS */
function buildSignal(sym){
let rsi=Math.random()*100;
let stoch=Math.random()*100;

let action="WAIT";

if(mode==="sniper"){
if(rsi<25 && stoch<20) action="BUY";
if(rsi>75 && stoch>80) action="SELL";
}else{
if(rsi<30) action="BUY";
if(rsi>70) action="SELL";
}

signals[sym]={rsi,stoch,action};

if(action!=="WAIT") fireAlert(sym,action,rsi);
}

/* HEATMAP */
function renderHeat(){
let map=document.getElementById("heatmap");
map.innerHTML="";

Object.keys(signals).forEach(s=>{
let d=signals[s];

let c=document.createElement("div");
c.className="cell "+(d.action==="BUY"?"buy":d.action==="SELL"?"sell":"");

c.innerHTML=`${s}<br>${d.action}<br>${Math.round(d.rsi)}`;

c.onclick=()=>{
symbol=s;
loadChart();
};

map.appendChild(c);
});
}

/* ALERT */
function fireAlert(sym,act,rsi){
let div=document.createElement("div");
div.className="alert";
div.style.top=(60+document.querySelectorAll(".alert").length*50)+"px";
div.style.color=act==="BUY"?"#00ff88":"#ff4444";
div.innerText=act+" "+sym+" RSI:"+Math.round(rsi);

document.body.appendChild(div);
setTimeout(()=>div.remove(),4000);
}

/* OPTIONS */
function toggleOptions(){
let o=document.getElementById("options");
o.innerHTML="";

for(let i=0;i<5;i++){
let d=document.createElement("div");
d.className="option-box";
d.innerText=`${symbol} CALL ${100+i*5}`;
o.appendChild(d);
}
}

/* CALC */
function toggleCalc(){
let c=document.getElementById("calc");
c.innerHTML=`
Balance <input id="bal" value="500">
Risk % <input id="risk" value="5">
Entry <input id="entry" value="1.5">
Stop <input id="stop" value="1.2">
<button onclick="runCalc()">CALCULATE</button>
<div id="result"></div>
`;
}

function runCalc(){
let B=+bal.value||0;
let R=+risk.value/100||0;
let E=+entry.value||0;
let S=+stop.value||0;

let riskAmt=B*R;
let diff=Math.abs(E-S)||1;

let qty=Math.floor(riskAmt/diff);

result.innerHTML=`
Qty:${qty}<br>
Risk:$${riskAmt.toFixed(2)}<br>
T1:${(E+diff).toFixed(2)}<br>
T2:${(E+2*diff).toFixed(2)}<br>
T3:${(E+3*diff).toFixed(2)}
`;
}

/* LOOP */
function loop(){
watchlist.forEach(s=>buildSignal(s));
renderHeat();
renderWatchlist();
setTimeout(loop,12000);
}

</script>
</body>
</html>
